<title>תקציב</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── DESIGN TOKENS ─────────────────────────────────── */
:root {
  /* ── Palette ── */
  --bg:          #020617;   /* Slate-950: deep blue-black */
  --surface:     #0B1120;   /* Slate-900: card bg */
  --surface-hi:  #111827;   /* Slate-850: elevated */
  --surface-hover: #1E2A3A; /* hover state */
  --border:      rgba(148,163,184,.08);  /* Slate-400 @ 8% */
  --border-hi:   rgba(148,163,184,.14);

  /* ── Typography ── */
  --text-1:  #F8FAFC;   /* Slate-50 */
  --text-2:  #94A3B8;   /* Slate-400 */
  --text-3:  #475569;   /* Slate-600 */

  /* ── Functional colors ── */
  --accent:     #10B981;           /* Emerald-500 */
  --accent-lo:  rgba(16,185,129,.10);
  --accent-med: rgba(16,185,129,.18);
  --danger:     #F43F5E;           /* Rose-500 */
  --danger-lo:  rgba(244,63,94,.10);
  --warn:       #F59E0B;           /* Amber-500 */
  --warn-lo:    rgba(245,158,11,.10);
  --muted:      #64748B;           /* Slate-500 */

  /* ── Layout ── */
  --radius:     12px;
  --radius-sm:  8px;
  --radius-lg:  18px;
  --sidebar-w:  200px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Heebo',sans-serif;
  background:#020617;
  color:var(--text-1);
  min-height:100vh;
  min-height:-webkit-fill-available;
  overscroll-behavior:none;
  font-size:14px;
  line-height:1.5;
}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}

/* ── AUTH SCREEN ── */
.auth-screen{position:fixed;inset:0;background:#09090B;display:flex;align-items:center;justify-content:center;padding:24px;z-index:500;}
.auth-box{background:#111113;border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:32px;width:100%;max-width:400px;}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.auth-logo-icon{background:rgba(13,216,128,0.15);border:1px solid rgba(13,216,128,0.3);border-radius:14px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.auth-title{font-weight:800;font-size:20px;}
.auth-sub{color:#7b82a8;font-size:12px;margin-top:2px;}
.auth-tabs{display:flex;background:#17171B;border-radius:10px;padding:4px;margin-bottom:20px;}
.auth-tab{flex:1;border:none;background:none;border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;padding:9px;color:#7b82a8;transition:all .2s;}
.auth-tab.active{background:#111113;color:#e8eaf0;box-shadow:0 1px 4px rgba(0,0,0,.4);}
.auth-form{display:flex;flex-direction:column;gap:12px;}
.auth-input{background:#17171B;border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:#e8eaf0;font-family:'Heebo',sans-serif;font-size:14px;padding:12px 16px;outline:none;transition:border-color .2s;width:100%;}
.auth-input:focus{border-color:#0DD880;}
.auth-btn{background:#0DD880;border:none;border-radius:10px;color:#000;cursor:pointer;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;padding:13px;transition:all .2s;}
.auth-btn:active{transform:scale(.98);}
.auth-divider{display:flex;align-items:center;gap:10px;margin:4px 0;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#252836;}
.auth-divider span{color:#7b82a8;font-size:12px;}
.auth-google{background:#17171B;border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:#e8eaf0;cursor:pointer;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;padding:12px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
.auth-google:hover{border-color:#0DD880;}
.auth-error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#f87171;font-size:13px;padding:10px 14px;}
.auth-forgot{color:#0DD880;font-size:13px;cursor:pointer;text-align:center;background:none;border:none;font-family:'Heebo',sans-serif;width:100%;}

/* ── APP ── */
.header{background:#111113;border-bottom:1px solid #252836;padding:12px 20px;padding-top:calc(env(safe-area-inset-top) + 12px);position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{background:rgba(13,216,128,0.15);border:1px solid rgba(13,216,128,0.3);border-radius:12px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.logo-title{font-weight:800;font-size:16px;}.logo-sub{color:#7b82a8;font-size:11px;}
.header-right{display:flex;align-items:center;gap:10px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#68d391;display:inline-block;}
.sync-dot.offline{background:#f6ad55;}.sync-dot.syncing{background:#63b3ed;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.user-badge{background:#17171B;border:1px solid rgba(255,255,255,0.08);border-radius:20px;color:#0DD880;font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
.backup-bar{background:#111113;border-bottom:1px solid #252836;padding:8px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.bar-label{color:#7b82a8;font-size:11px;margin-left:auto;}
.btn-backup{background:rgba(72,187,120,.15);color:#68d391;border:none;border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;}
.btn-restore{background:rgba(13,216,128,.15);color:#0DD880;border:none;border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;}
.btn-email{background:rgba(246,173,85,.15);color:#f6ad55;border:none;border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;}
.nav{background:#111113;border-bottom:1px solid #252836;display:flex;overflow-x:auto;padding:6px 12px;gap:4px;-webkit-overflow-scrolling:touch;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:500;padding:8px 14px;border-radius:10px;color:#7b82a8;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.nav-btn.active{background:rgba(13,216,128,.12);color:#0DD880;}
.month-bar{padding:12px 16px;border-bottom:1px solid #1e2130;display:flex;gap:6px;overflow-x:auto;align-items:center;-webkit-overflow-scrolling:touch;}
.month-bar::-webkit-scrollbar{display:none;}
.year-sel{background:#17171B;border:1.5px solid rgba(255,255,255,0.08);border-radius:8px;color:#e8eaf0;font-family:'Heebo',sans-serif;font-size:12px;padding:5px 10px;flex-shrink:0;outline:none;}
.mbtn{background:#17171B;border:1.5px solid transparent;border-radius:8px;color:#7b82a8;cursor:pointer;font-family:'Heebo',sans-serif;font-size:11px;padding:5px 10px;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.mbtn.active{background:rgba(13,216,128,.12);border-color:#0DD880;color:#0DD880;}
.content{padding:16px;max-width:900px;margin:0 auto;padding-bottom:calc(env(safe-area-inset-bottom) + 32px);}
/* ── CARD ───────────────────────────────────────────── */
.card{
  background:var(--surface);
  border:none;
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:8px;
}

/* ── SECTION LABEL ──────────────────────────────────── */
.section-title{
  color:var(--text-3);
  font-size:10px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:16px;
}

/* ── STAT GRID ──────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.stat-card{background:var(--surface-hi);border-radius:var(--radius-sm);padding:16px;}
.stat-icon{display:none;}
.stat-label{color:var(--text-3);font-size:11px;font-weight:500;margin-bottom:6px;}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.5px;}

/* ── TABLE (minimal) ────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{
  padding:8px 12px;
  text-align:right;
  font-size:11px;
  font-weight:600;
  color:var(--text-3);
  border-bottom:1px solid var(--border);
  background:transparent;
}
.tbl td{
  padding:12px 12px;
  border-bottom:1px solid var(--border);
  font-size:13px;
  vertical-align:middle;
}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.015);}

/* ── ROW ACTIONS (hidden, reveal on hover) ──────────── */
.row-actions{
  display:flex;gap:4px;
  opacity:0;
  transition:opacity .15s ease;
  pointer-events:none;
}
tr:hover .row-actions,
.row-line:hover .row-actions{
  opacity:1;
  pointer-events:auto;
}
@media(max-width:768px){
  .row-actions{ opacity:1; pointer-events:auto; }
}

/* ── TAGS ───────────────────────────────────────────── */
.tag{
  border-radius:6px;
  font-size:10px;
  font-weight:600;
  padding:2px 7px;
  display:inline-block;
  letter-spacing:.02em;
}
.tag-p{background:rgba(99,179,237,.10);color:#93C5FD;}
.tag-f{background:rgba(251,191,36,.10);color:#FCD34D;}
.tag-p2{background:rgba(167,139,250,.10);color:#C4B5FD;}
.tag-custom{background:var(--accent-lo);color:var(--accent);}

/* ── BUTTONS ────────────────────────────────────────── */
.btn{
  border:none;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-family:'Heebo',sans-serif;
  font-weight:600;
  transition:opacity .15s,transform .1s;
}
.btn:active{transform:scale(.97);}
.btn-primary{
  background:var(--accent);
  color:#000;
  padding:9px 18px;
  font-size:13px;
}
.btn-primary:hover{opacity:.88;}
.btn-ghost{
  background:transparent;
  color:var(--text-2);
  padding:9px 18px;
  font-size:13px;
  border:1px solid var(--border-hi);
}
.btn-ghost:hover{color:var(--text-1);border-color:rgba(255,255,255,.15);}
.btn-del{
  background:transparent;
  color:var(--text-3);
  padding:5px 9px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-size:13px;
  transition:color .15s,background .15s;
}
.btn-del:hover{color:var(--danger);background:var(--danger-lo);}
.btn-edt{
  background:transparent;
  color:var(--text-3);
  padding:5px 9px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-size:13px;
  transition:color .15s,background .15s;
}
.btn-edt:hover{color:var(--accent);background:var(--accent-lo);}

/* ── LAYOUT HELPERS ─────────────────────────────────── */
.add-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  gap:8px;
}
.total-row{
  text-align:left;
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid var(--border);
  font-weight:700;
  color:var(--text-1);
  font-size:14px;
}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}

/* ── MODAL ──────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px);
  z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal{
  background:#141417;
  border:1px solid var(--border-hi);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  padding:24px 24px calc(env(safe-area-inset-bottom,16px) + 24px);
  width:100%;max-width:520px;
  animation:slideUp .22s cubic-bezier(.2,0,.2,1);
  max-height:88vh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-title{font-weight:700;font-size:17px;margin-bottom:20px;color:var(--text-1);}
.form-group{display:flex;flex-direction:column;gap:12px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* ── INPUTS ─────────────────────────────────────────── */
.input{
  background:var(--surface-hi);
  border:1.5px solid var(--border-hi);
  border-radius:var(--radius-sm);
  color:var(--text-1);
  font-family:'Heebo',sans-serif;
  font-size:16px;
  padding:12px 14px;
  width:100%;
  outline:none;
  transition:border-color .18s;
  -webkit-appearance:none;
  appearance:none;
}
.input:focus{border-color:var(--accent);}
.input-row{display:flex;gap:8px;}.input-row .input{flex:1;}

/* ── MISC ───────────────────────────────────────────── */
.empty{color:var(--text-3);text-align:center;padding:28px 0;font-size:13px;}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row-line{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;
  border-bottom:1px solid var(--border);
}
.row-line:last-child{border-bottom:none;}

/* ── GOAL BARS ──────────────────────────────────────── */
.goal-bar-wrap{margin-top:8px;background:var(--surface-hi);border-radius:4px;height:4px;overflow:hidden;}
.goal-bar{height:4px;border-radius:4px;transition:width .4s;}
.goal-ok{background:var(--accent);}
.goal-warn{background:var(--warn);}
.goal-over{background:var(--danger);}
.goal-label{font-size:11px;color:var(--text-3);margin-top:4px;display:flex;justify-content:space-between;}

/* ── ALERT ──────────────────────────────────────────── */
.alert-banner{
  background:var(--danger-lo);
  border:1px solid rgba(248,113,113,.2);
  border-radius:var(--radius-sm);
  padding:12px 16px;
  margin-bottom:16px;
  font-size:13px;
  color:var(--danger);
}

/* ── SETTINGS ───────────────────────────────────────── */
.settings-section-title{font-size:13px;font-weight:600;color:var(--text-1);margin-bottom:12px;}
.pill-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.pill{
  display:flex;align-items:center;gap:6px;
  background:var(--surface-hi);
  border:1px solid var(--border);
  border-radius:20px;
  padding:5px 12px;font-size:12px;
}
.pill-del{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:13px;padding:0;line-height:1;}
.pill-del:hover{color:var(--danger);}
.goal-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);gap:8px;
}
.goal-row:last-child{border-bottom:none;}
.goal-input{
  background:var(--surface-hi);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text-1);
  font-family:'Heebo',sans-serif;
  font-size:13px;
  padding:5px 10px;width:100px;
  outline:none;text-align:left;
}
.loading-screen{position:fixed;inset:0;background:#09090B;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.loading-icon{background:rgba(13,216,128,0.15);border:1px solid rgba(13,216,128,0.3);border-radius:20px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:30px;}
.loading-text{color:#7b82a8;font-size:14px;}
.spinner{width:24px;height:24px;border:3px solid #252836;border-top-color:#0DD880;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 24px);left:50%;transform:translateX(-50%);background:#252836;border:1px solid #3a3f5c;border-radius:12px;color:#e8eaf0;font-size:13px;font-weight:600;padding:12px 22px;z-index:999;white-space:nowrap;animation:fadeInUp .3s ease;}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
/* Excel import */
.btn-excel{background:rgba(72,187,120,.15);color:#68d391;border:1.5px dashed rgba(72,187,120,.4);border-radius:10px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;padding:10px 18px;display:flex;align-items:center;gap:7px;transition:all .2s;}
.btn-excel:hover{background:rgba(72,187,120,.25);}
.import-preview{background:#17171B;border-radius:12px;padding:14px;margin-top:12px;}
.import-preview-title{font-size:12px;font-weight:700;color:#7b82a8;margin-bottom:10px;}
.import-preview-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #252836;font-size:13px;}
.import-preview-row:last-child{border-bottom:none;}
.import-preview-row .chk{accent-color:#0DD880;width:16px;height:16px;cursor:pointer;margin-left:8px;}
.import-warning{background:rgba(246,173,85,.1);border:1px solid rgba(246,173,85,.3);border-radius:8px;color:#f6ad55;font-size:12px;padding:8px 12px;margin-top:8px;}
.import-template{color:#0DD880;font-size:12px;cursor:pointer;background:none;border:none;font-family:'Heebo',sans-serif;text-decoration:underline;}
/* User menu dropdown */
.user-menu{position:fixed;top:60px;left:20px;background:#111113;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:8px;z-index:100;min-width:200px;animation:fadeInUp .2s ease;}
.user-menu-item{border:none;background:none;cursor:pointer;font-family:'Heebo',sans-serif;font-size:14px;padding:10px 14px;border-radius:8px;width:100%;text-align:right;color:#e8eaf0;transition:background .15s;}
.user-menu-item:hover{background:#17171B;}
.user-menu-item.danger{color:#f87171;}
.user-menu-email{color:#7b82a8;font-size:12px;padding:8px 14px;}
@media(min-width:601px){.stat-grid{grid-template-columns:repeat(3,1fr);}.grid2{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){
  /* Auth */
  .auth-screen{padding:16px;align-items:flex-start;padding-top:max(48px,env(safe-area-inset-top));}
  .auth-box{padding:22px 18px;border-radius:20px;}
  .auth-title{font-size:18px;}
  .auth-input{font-size:16px;padding:14px 14px;} /* 16px prevents iOS zoom */
  .auth-btn{font-size:16px;padding:15px;}
  .auth-google{font-size:15px;padding:14px;}

  /* Header & Nav */
  .header{padding:10px 14px;padding-top:calc(env(safe-area-inset-top) + 10px);}
  .logo-title{font-size:15px;}
  .user-badge{max-width:90px;font-size:10px;}
  .backup-bar{padding:6px 10px;gap:5px;overflow-x:auto;flex-wrap:nowrap;}
  .backup-bar .bar-label{display:none;}
  .btn-backup,.btn-restore,.btn-email{font-size:11px;padding:6px 10px;white-space:nowrap;}
  .nav{padding:4px 8px;gap:2px;}
  .nav-btn{font-size:12px;padding:7px 10px;}

  /* Content */
  .content{padding:12px;padding-bottom:calc(env(safe-area-inset-bottom) + 80px);}
  .card{padding:14px;border-radius:14px;margin-bottom:10px;}
  .section-title{font-size:10px;}

  /* Stats grid — 2 col on mobile */
  .stat-grid{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .stat-card{padding:12px 10px;}
  .stat-icon{font-size:18px;margin-bottom:4px;}
  .stat-val{font-size:18px;}
  .stat-label{font-size:10px;}

  /* Tables — compact */
  .tbl th,.tbl td{padding:7px 6px;font-size:12px;}
  .tbl th:last-child,.tbl td:last-child{padding-left:2px;}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;}

  /* Grid2 — single col */
  .grid2{grid-template-columns:1fr;}

  /* Buttons */
  .btn-del,.btn-edt{padding:7px 10px;font-size:12px;}
  .btn-primary,.btn-ghost{padding:10px 16px;font-size:13px;}
  .btn-excel{font-size:12px;padding:9px 14px;}

  /* Modals — full screen on mobile */
  .modal{max-height:92vh;padding:20px 16px;padding-bottom:calc(env(safe-area-inset-bottom) + 20px);}
  .modal-title{font-size:16px;margin-bottom:14px;}
  .input{font-size:16px;padding:13px 12px;} /* 16px prevents iOS zoom */

  /* Month bar */
  .month-bar{padding:8px 10px;}
  .mbtn{font-size:10px;padding:5px 9px;}

  /* User menu */
  .user-menu{left:10px;right:10px;min-width:unset;}

  /* Onboarding */
  .ob-header{padding:22px 18px 16px;}
  .ob-body{padding:14px 14px 0;}
  .ob-footer{padding:12px 14px;}
  .ob-card{padding:16px;}
  .ob-chip{font-size:12px;padding:7px 12px;}
  .ob-input,.ob-select{font-size:16px;} /* prevent zoom */

  /* Row actions */
  .add-row{flex-direction:row;align-items:center;}
  .row-line{flex-wrap:wrap;gap:6px;}
}

/* iPhone notch/dynamic island */
@supports(padding-top: env(safe-area-inset-top)){
  .header{padding-top:calc(env(safe-area-inset-top) + 10px);}
  .toast{bottom:calc(env(safe-area-inset-bottom) + 20px);}
}
.app-footer{text-align:center;padding:32px 20px 24px;margin-top:16px;border-top:1px solid #1a1d2e;}
.app-footer-logo{font-size:22px;margin-bottom:6px;}
.app-footer-copy{font-size:12px;font-weight:700;color:#4a5068;margin-bottom:12px;letter-spacing:.03em;}
.app-footer-divider{width:40px;height:1px;background:#252836;margin:12px auto;}
.app-footer-disclaimer{font-size:10.5px;color:#2e3450;line-height:1.8;max-width:460px;margin:0 auto;}

/* ── Onboarding Wizard ───────────────────────────────── */
.ob-screen{position:fixed;inset:0;background:#09090B;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:0 0 40px;}
.ob-header{width:100%;background:#0DD880;padding:28px 24px 20px;text-align:center;}
.ob-logo{font-size:36px;margin-bottom:8px;}
.ob-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px;}
.ob-sub{font-size:13px;color:rgba(255,255,255,.8);}
.ob-progress{width:100%;max-width:480px;padding:16px 24px 0;}
.ob-steps{display:flex;gap:6px;margin-bottom:8px;}
.ob-step-dot{flex:1;height:4px;border-radius:2px;background:#252836;transition:background .3s;}
.ob-step-dot.done{background:#0DD880;}
.ob-step-dot.active{background:#0DD880;}
.ob-step-label{font-size:11px;color:#7b82a8;text-align:center;}
.ob-body{width:100%;max-width:480px;padding:20px 20px 0;}
.ob-card{background:#111113;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px;margin-bottom:14px;}
.ob-card-title{font-size:15px;font-weight:800;color:#e8eaf0;margin-bottom:4px;}
.ob-card-sub{font-size:12px;color:#7b82a8;margin-bottom:16px;line-height:1.5;}
.ob-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
.ob-chip{padding:8px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.08);background:#17171B;font-size:13px;color:#c8cce0;cursor:pointer;transition:all .2s;user-select:none;}
.ob-chip.selected{background:rgba(13,216,128,.2);border-color:#0DD880;color:#0DD880;font-weight:600;}
.ob-chip.cat-p{border-color:#4a3f8a;}
.ob-chip.cat-f{border-color:#3a5a3a;}
.ob-chip.cat-p.selected{background:rgba(13,216,128,.2);border-color:#0DD880;}
.ob-chip.cat-f.selected{background:rgba(72,187,120,.15);border-color:#48bb78;color:#68d391;}
.ob-input{background:#17171B;border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:#e8eaf0;font-family:'Heebo',sans-serif;font-size:14px;padding:11px 14px;width:100%;outline:none;margin-bottom:10px;box-sizing:border-box;}
.ob-input:focus{border-color:#0DD880;}
.ob-select{background:#17171B;border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:#e8eaf0;font-family:'Heebo',sans-serif;font-size:14px;padding:11px 14px;width:100%;outline:none;margin-bottom:10px;box-sizing:border-box;cursor:pointer;}
.ob-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
.ob-row label{font-size:13px;color:#c8cce0;flex:1;}
.ob-toggle{display:flex;gap:6px;}
.ob-toggle-btn{flex:1;padding:8px;border:1.5px solid rgba(255,255,255,0.08);border-radius:8px;background:#17171B;color:#7b82a8;font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;text-align:center;transition:all .2s;}
.ob-toggle-btn.active{background:rgba(13,216,128,.2);border-color:#0DD880;color:#0DD880;font-weight:700;}
.ob-income-row{background:#17171B;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.ob-income-row input[type=checkbox]{accent-color:#0DD880;width:18px;height:18px;flex-shrink:0;cursor:pointer;}
.ob-income-row label{font-size:13px;color:#c8cce0;flex:1;cursor:pointer;}
.ob-income-detail{margin-top:8px;padding-top:8px;border-top:1px solid #252836;}
.ob-footer{width:100%;max-width:480px;padding:16px 20px;position:sticky;bottom:0;background:linear-gradient(to top,#0f1117 70%,transparent);}
.ob-btn-next{width:100%;padding:14px;background:#0DD880;border:none;border-radius:12px;color:#fff;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.ob-btn-next:hover{opacity:.9;}
.ob-btn-back{background:none;border:none;color:#7b82a8;font-family:'Heebo',sans-serif;font-size:13px;cursor:pointer;margin-bottom:8px;padding:4px 0;}
.ob-emoji{font-size:28px;margin-bottom:8px;}

/* ── MOBILE BOTTOM NAV ─────────────────────────────── */
@media(max-width:600px){
  .nav{display:none !important;}
  .mobile-bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:#111113;border-top:1px solid #252836;
    padding:8px 4px;padding-bottom:calc(env(safe-area-inset-bottom) + 8px);
    z-index:60;gap:0;
  }
  .mobile-bottom-nav .mbn-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif;
    color:#7b82a8;font-size:9px;font-weight:600;padding:4px 2px;
    border-radius:10px;transition:all .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .mobile-bottom-nav .mbn-btn .mbn-icon{font-size:20px;line-height:1;}
  .mobile-bottom-nav .mbn-btn.active{color:#0DD880;}
  .mobile-bottom-nav .mbn-btn.active .mbn-icon{
    background:rgba(13,216,128,.18);border-radius:10px;padding:4px 10px;
  }
  .content{padding-bottom:calc(env(safe-area-inset-bottom) + 90px) !important;}
}
@media(min-width:601px){
  .mobile-bottom-nav{display:none;}
}

/* ── LIGHT MODE ─────────────────────────────────────── */
body.light-mode {
  --bg:        #F2F4F8;
  --bg2:       #ffffff;
  --bg3:       #e8eaf0;
  --border:    #d0d4e8;
  --border2:   #c0c6dc;
  --text:      #1a1d2e;
  --text2:     #4a5068;
  --text3:     #7b82a8;
  --accent:    #059652;
  --accent2:   #0DD880;
}
body.light-mode { background: var(--bg); color: var(--text); }
body.light-mode .header,
body.light-mode .nav,
body.light-mode .month-bar,
body.light-mode .backup-bar,
body.light-mode .mobile-bottom-nav { background: var(--bg2); border-color: var(--border); }
body.light-mode .card { background: var(--bg2); border-color: var(--border); }
body.light-mode .auth-box,
body.light-mode .auth-screen { background: var(--bg); }
body.light-mode .auth-box { background: var(--bg2); border-color: var(--border); }
body.light-mode .auth-input,
body.light-mode .input,
body.light-mode .ob-input,
body.light-mode .ob-select { background: var(--bg3); border-color: var(--border2); color: var(--text); }
body.light-mode .auth-tabs { background: var(--bg3); }
body.light-mode .auth-tab.active { background: var(--bg2); color: var(--text); }
body.light-mode .auth-tab { color: var(--text3); }
body.light-mode .auth-google { background: var(--bg3); border-color: var(--border2); color: var(--text); }
body.light-mode .modal { background: var(--bg2); border-color: var(--border2); }
body.light-mode .overlay { background: rgba(0,0,0,0.5); }
body.light-mode .nav-btn { color: var(--text3); }
body.light-mode .nav-btn.active { background: rgba(90,82,224,.12); color: var(--accent); }
body.light-mode .mbtn { background: var(--bg3); color: var(--text3); }
body.light-mode .mbtn.active { background: rgba(90,82,224,.12); color: var(--accent); border-color: var(--accent); }
body.light-mode .tbl th { background: var(--bg3); color: var(--text3); }
body.light-mode .tbl td { border-color: var(--bg3); color: var(--text); }
body.light-mode .row-line { border-color: var(--bg3); }
body.light-mode .pill { background: var(--bg3); border-color: var(--border); color: var(--text); }
body.light-mode .user-badge { background: var(--bg3); border-color: var(--border); color: var(--accent); }
body.light-mode .user-menu { background: var(--bg2); border-color: var(--border); }
body.light-mode .user-menu-item { color: var(--text); }
body.light-mode .user-menu-item:hover { background: var(--bg3); }
body.light-mode .user-menu-email { color: var(--text3); }
body.light-mode .section-title { color: var(--accent); }
body.light-mode .empty { color: var(--text3); }
body.light-mode .stat-card { filter: brightness(0.97); }
body.light-mode .ob-screen { background: var(--bg); }
body.light-mode .ob-card { background: var(--bg2); border-color: var(--border); }
body.light-mode .ob-chip { background: var(--bg3); border-color: var(--border2); color: var(--text); }
body.light-mode .ob-income-row { background: var(--bg3); }
body.light-mode .loading-screen { background: var(--bg); }
body.light-mode .toast { background: var(--bg2); border-color: var(--border); color: var(--text); }
body.light-mode .btn-ghost { background: var(--bg3); color: var(--text2); }
body.light-mode .goal-input { background: var(--bg3); border-color: var(--border2); color: var(--text); }
body.light-mode .year-sel { background: var(--bg3); border-color: var(--border2); color: var(--text); }
body.light-mode .import-preview { background: var(--bg3); }
body.light-mode .app-footer { border-color: var(--border); }
body.light-mode .app-footer-copy { color: var(--text3); }
body.light-mode .meta-name-color { color: var(--theme-color) !important; }

/* ── ANIMATIONS (Lovable-style) ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.content > * { animation: fadeUp .35s cubic-bezier(.2,0,.2,1) both; }
.auth-box { animation: fadeInScale .3s cubic-bezier(.2,0,.2,1) both; }
.modal { }
/* Landing smooth appear */
#landingScreen > div > * { animation: fadeUp .4s cubic-bezier(.2,0,.2,1) both; }
#landingScreen > div > *:nth-child(1) { animation-delay:.05s }
#landingScreen > div > *:nth-child(2) { animation-delay:.12s }
#landingScreen > div > *:nth-child(3) { animation-delay:.18s }
#landingScreen > div > *:nth-child(4) { animation-delay:.24s }
/* Health-score ring pulse */
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(13,216,128,0)}50%{box-shadow:0 0 16px 2px rgba(13,216,128,.18)}}
/* Stat cards stagger */
.stat-card { animation: fadeUp .4s cubic-bezier(.2,0,.2,1) both; }
.stat-grid .stat-card:nth-child(1){animation-delay:.05s}
.stat-grid .stat-card:nth-child(2){animation-delay:.10s}
.stat-grid .stat-card:nth-child(3){animation-delay:.15s}
.stat-grid .stat-card:nth-child(4){animation-delay:.20s}
/* Button hover polish */
.auth-btn:hover,.btn-primary:hover,.ob-btn-next:hover { opacity:.88; transform:translateY(-1px); }
.btn-ghost:hover { background:rgba(255,255,255,.07) !important; }
.nav-btn:hover:not(.active){ background:rgba(255,255,255,.04); color:#e8eaf0; }
/* Smooth nav active indicator */
.nav-btn.active { position:relative; }
/* Card hover */
.card:hover { border-color:rgba(255,255,255,.10); }
/* Toast polish */
.toast { border-radius:14px !important; backdrop-filter:blur(10px); background:rgba(22,25,34,.95) !important; }

/* ── SIDEBAR LAYOUT ── */
.app-layout{display:flex;min-height:100vh;}
.app-sidebar{
  position:fixed;top:0;right:0;bottom:0;
  width:var(--sidebar-w);
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  z-index:100;overflow-y:auto;
}
.app-sidebar::-webkit-scrollbar{width:0;}

.sidebar-brand{
  display:flex;align-items:center;gap:10px;
  padding:20px 16px 14px;
}
.sidebar-brand-icon{
  width:30px;height:30px;border-radius:8px;
  background:var(--accent-lo);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.sidebar-brand-name{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--text-1);}
.sidebar-brand-sub{font-size:9px;color:var(--text-3);margin-top:1px;letter-spacing:.05em;}

.sidebar-nav{flex:1;padding:8px;display:flex;flex-direction:column;gap:1px;}
.snav-btn{
  display:flex;align-items:center;gap:9px;
  width:100%;padding:8px 10px;border-radius:8px;
  border:none;background:transparent;
  color:var(--text-3);
  font-family:'Heebo',sans-serif;
  font-size:13px;font-weight:400;
  cursor:pointer;
  transition:color .15s,background .15s;
  text-align:right;
}
.snav-btn:hover{background:var(--surface-hi);color:var(--text-2);}
.snav-btn.active{
  background:var(--accent-lo);
  color:var(--accent);
  font-weight:600;
}
.snav-icon{font-size:14px;flex-shrink:0;opacity:.7;}
.snav-btn.active .snav-icon{opacity:1;}

.sidebar-divider{height:1px;background:var(--border);margin:6px 10px;}
.sidebar-footer{padding:10px 8px 12px;}

.sidebar-avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#000;
}
.sidebar-user-name{font-size:12px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-1);}
.sidebar-user-role{font-size:10px;color:var(--text-3);}

.app-main{
  margin-right:var(--sidebar-w);flex:1;
  display:flex;flex-direction:column;min-height:100vh;
}
.app-topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(9,9,11,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:10px 24px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
  min-height:52px;
}
.topbar-left{display:flex;align-items:center;gap:8px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-title{font-size:14px;font-weight:600;color:var(--text-1);}
.app-content{padding:28px 28px 48px;max-width:900px;}

/* Month bar as topbar element */
.month-bar-inline{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.month-bar-inline::-webkit-scrollbar{display:none;}

/* Hide old nav, show sidebar on desktop */
.nav{display:none!important;}
.mobile-bottom-nav{display:none;}
.header{display:none!important;}
.backup-bar{display:none!important;}

   MOBILE — Redesigned Bottom Navigation

/* LTR override for non-Hebrew/Arabic */
body.ltr-mode{direction:ltr;}
body.ltr-mode .app-sidebar{right:auto;left:0;border-left:none;border-right:1px solid rgba(255,255,255,.06);}
body.ltr-mode .app-main{margin-right:0;margin-left:220px;}
body.ltr-mode .snav-btn{text-align:left;}
@media(max-width:768px){
  body.ltr-mode .app-sidebar{right:0;left:0;}
  body.ltr-mode .app-main{margin-left:0;}
}

/* Lang selector */
.lang-selector{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  justify-content:center;margin-bottom:16px;
}
.lang-btn{
  padding:5px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.1);
  background:transparent;color:#7b82a8;font-size:11px;cursor:pointer;
  font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:4px;
}
.lang-btn.active,.lang-btn:hover{background:rgba(13,216,128,.12);border-color:rgba(13,216,128,.3);color:#0DD880;}

/* Deposit button */
.btn-deposit{background:rgba(13,216,128,.12);color:#0DD880;padding:6px 12px;border-radius:8px;border:1px solid rgba(13,216,128,.25);cursor:pointer;font-size:12px;font-family:'Heebo',sans-serif;font-weight:600;}
.btn-deposit:hover{background:rgba(13,216,128,.22);}
.mobile-only-flex{display:none;}
@media(max-width:768px){.mobile-only-flex{display:flex!important;}}


/* ── MOBILE CORE FIXES ──────────────────────────────── */
* { box-sizing: border-box; }

/* Prevent iOS input zoom — inputs must be >= 16px font size */
@media(max-width:768px){
  input[type=text], input[type=email], input[type=password],
  input[type=number], input[type=date], select, textarea {
    font-size: 16px !important;
  }
}

/* Touch target minimum 44px (Apple HIG) */
@media(max-width:768px){
  button { min-height: 44px; touch-action: manipulation; }
  .snav-btn { min-height: 0 !important; }
}

/* Fix modal z-index on mobile */
.overlay { z-index: 300; }

/* ── TRANSACTION ROWS ───────────────────────────────── */
.tx-row:last-child{border-bottom:none!important;}
.tx-row:hover{background:rgba(255,255,255,.015);}
.tx-row:hover .row-actions{opacity:1;pointer-events:auto;}

/* ── STAT GRID (desktop 3-col) ──────────────────────── */
@media(min-width:601px){
  .stat-grid{grid-template-columns:repeat(3,1fr);}
  .grid2{grid-template-columns:1fr 1fr;}
}

/* ── MODAL ON DESKTOP ───────────────────────────────── */
@media(min-width:769px){
  .overlay{align-items:center;}
  .modal{
    border-radius:var(--radius-lg)!important;
    max-width:480px;
    padding:28px!important;
    max-height:80vh;
  }
}

/* ── CLEAN SCROLLBAR ────────────────────────────────── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px;}

/* ── SECTION SPACING ────────────────────────────────── */
.app-content > .card + .card{margin-top:0;}

/* ── LTR SIDEBAR ────────────────────────────────────── */
body.ltr-mode .app-sidebar{right:auto;left:0;border-left:none;border-right:1px solid var(--border);}
body.ltr-mode .app-main{margin-right:0;margin-left:var(--sidebar-w);}
body.ltr-mode .snav-btn{text-align:left;}


/* ── FAB (Floating Action Button) ──────────────────── */
.fab{
  position:fixed;
  bottom:calc(56px + env(safe-area-inset-bottom,0px) + 14px);
  left:50%; transform:translateX(-50%);
  background:var(--accent);
  color:#000;
  border:none;
  border-radius:50px;
  padding:13px 24px;
  font-family:'Heebo',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  display:none;
  align-items:center;
  gap:6px;
  box-shadow:0 4px 24px rgba(16,185,129,.35),0 1px 4px rgba(0,0,0,.3);
  z-index:250;
  transition:transform .15s,opacity .15s;
}
.fab:active{transform:translateX(-50%) scale(.95);}
@media(max-width:768px){
  .fab{ display:flex; }
}

/* ── Amount display (RTL-safe) ── */
.amount{
  direction:ltr;
  display:inline-flex;
  flex-direction:row-reverse;
  font-feature-settings:'tnum';
  letter-spacing:-.3px;
}
.amount-neg{ color:var(--danger); }
.amount-pos{ color:var(--accent); }
.amount-neu{ color:var(--text-1); }

/* ── Hero number ── */
.hero-amount{
  font-size:44px;
  font-weight:800;
  letter-spacing:-2px;
  line-height:1;
}
@media(max-width:768px){
  .hero-amount{ font-size:36px; }
}

/* ── Clean divider (ultra-subtle) ── */
.row-sep{
  height:1px;
  background:var(--border);
  margin:0;
}

/* ── Remove card hover border on new design ── */
.card:hover{ background:var(--surface)!important; }

/* ── Topbar hide action buttons on mobile (use FAB instead) ── */
@media(max-width:768px){
  .topbar-action-hide{ display:none!important; }
}

/* ── Onboarding chip on new palette ── */
.ob-chip.selected{ background:var(--accent-lo)!important; border-color:var(--accent)!important; color:var(--accent)!important; }

/* ── Auth focus ── */
.auth-input:focus,.input:focus{ border-color:var(--accent)!important; }

/* ── Toast ── */
.toast{
  background:var(--surface-hi)!important;
  border:1px solid var(--border-hi)!important;
  border-radius:12px!important;
  backdrop-filter:blur(16px)!important;
  font-size:13px!important;
}

window.switchTab = function(tab) {
  window._authTab = tab;
  document.getElementById('tabLogin').className  = 'auth-tab'+(tab==='login'?' active':'');
  document.getElementById('tabRegister').className = 'auth-tab'+(tab==='register'?' active':'');

window.handleEmailAuth = async function() {
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  const name  = document.getElementById('authName').value.trim();
  const errEl = document.getElementById('authError');
  errEl.style.display='none';
  try {
    if(window._authTab==='register') {
      if(!name){errEl.textContent='נא להזין שם';errEl.style.display='block';return;}
      const consentChk = document.getElementById('emailConsentChk');
      if(!consentChk || !consentChk.checked){
        document.getElementById('authError').textContent='יש לאשר קבלת מיילים כדי להמשיך';
        document.getElementById('authError').style.display='block';
        return;
      }
      // Check if email already registered (any method) via usersMeta
      try {
        const metaQuery = await getDocs(collection(firestore,'usersMeta'));
        const emailExists = metaQuery.docs.some(d=>d.data().email===email);
        if(emailExists) {
          errEl.textContent = 'כתובת המייל כבר רשומה — נסה להתחבר';
          errEl.style.display='block';
          if(btn){btn.disabled=false;btn.textContent=origText;}
          return;
        }
      } catch(e){ /* proceed if check fails */ }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, {displayName: name});
      // Save user record to Firestore for admin panel
      try {
        const userMeta = doc(firestore, 'usersMeta', cred.user.uid);
        await setDoc(userMeta, { email: cred.user.email, displayName: name, plan: 'free', joinedAt: new Date().toISOString(), emailConsent: true, lastActive: new Date().toISOString() });
      } catch(e){ console.warn('usersMeta write failed', e); }
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {
    errEl.textContent = translateAuthError(e.code);
    errEl.style.display='block';
  }
};

window.handleGoogle = async function() {
  const errEl = document.getElementById('authError');
  errEl.style.display='none';
  const btn = document.querySelector('.auth-google');
  const origHTML = btn ? btn.innerHTML : '';
  if(btn){ btn.disabled=true; btn.style.opacity='0.7'; btn.innerHTML='<div class="spinner" style="width:18px;height:18px;margin:0 auto"></div>'; }
  
  const resetBtn = () => { if(btn){ btn.disabled=false; btn.style.opacity='1'; btn.innerHTML=origHTML; }};

  try {
    // Try popup first (works on desktop + most mobile browsers)
    await signInWithPopup(auth, googleProvider);
    resetBtn();
  } catch(popupErr) {
    // Popup failed (blocked by browser) — fall back to redirect
    if(popupErr.code === 'auth/popup-blocked' || 
       popupErr.code === 'auth/popup-closed-by-user' ||
       popupErr.code === 'auth/cancelled-popup-request') {
      try {
        await signInWithRedirect(auth, googleProvider);
        // page will reload — no need to resetBtn
      } catch(redirectErr) {
        resetBtn();
        errEl.textContent = translateAuthError(redirectErr.code);
        errEl.style.display = 'block';
      }
    } else {
      resetBtn();
      errEl.textContent = translateAuthError(popupErr.code);
      errEl.style.display = 'block';
    }
  }
};

function translateAuthError(code) {

    'auth/invalid-credential':'כתובת הדוא"ל או הסיסמה שגויים',

// ── Auth state listener ───────────────────────────────────
let _redirectChecked = false;
onAuthStateChanged(auth, async user => {
  // On first call, check for pending redirect result
  if(!_redirectChecked) {
    _redirectChecked = true;
    try {
      const result = await getRedirectResult(auth);
      if(result && result.user) {
        user = result.user;
      } else {
        // No redirect result and no user — show auth screen
        // (normal case when arriving fresh, not after Google redirect)
      }
    } catch(e) {
      console.warn('getRedirectResult error:', e.code, e.message);
      // Show the REAL error to help diagnose
      const errEl = document.getElementById('authError');
      if(errEl && e.code){
        errEl.textContent = '⚠️ שגיאת Google: ' + e.code + ' — ' + (e.message||'');
        errEl.style.display = 'block';
      }
    }
  }

  document.getElementById('loadingScreen').style.display='none';
  if(user) {
    currentUser = user;
    document.getElementById('authScreen').style.display='none';
    document.getElementById('landingScreen').style.display='none';
    document.getElementById('pricingScreen').style.display='none';
    document.getElementById('app').style.display='block';
    await loadUserDB();
  } else {
    currentUser = null;
    db = null;
    if(unsubscribe){unsubscribe();unsubscribe=null;}
    document.getElementById('authScreen').style.display='none';
    document.getElementById('landingScreen').style.display='block';
    initLanding();
    document.getElementById('app').style.display='none';
  }
});

// Apply theme CSS variables from appConfig
function applyTheme() {
  const t = appConfig.theme || {};
  const root = document.documentElement;
  if(t.primaryColor) root.style.setProperty('--primary', t.primaryColor);
  if(t.bgColor)      root.style.setProperty('--bg', t.bgColor);
  if(t.cardColor)    root.style.setProperty('--card', t.cardColor);
  if(t.accentColor)  root.style.setProperty('--accent', t.accentColor);
  if(t.textColor)    root.style.setProperty('--text', t.textColor);
}

// Returns whether a block is visible (default true)
function blockVisible(key) {
  const v = appConfig.blocks[key];
  return v === undefined ? true : v;
}

// Returns editable text for admin, plain text for others
function adminText(key, defaultText) {
  const val = appConfig.texts[key] || defaultText;
  if(!isAdmin()) return val;
  return `<span class="admin-editable" data-admin-key="${key}" data-admin-default="${defaultText.replace(/"/g,'&quot;')}" title="לחץ לעריכה (אדמין)">${val}<span class="admin-edit-icon">✏️</span></span>`;
}

// Tab label from config (admin-overrideable)
function tabLabel(tabId, defaultLabel) {
  return (appConfig.tabs.labels && appConfig.tabs.labels[tabId]) || defaultLabel;
}

// Is tab hidden by admin?
function tabHidden(tabId) {
  return (appConfig.tabs.hidden || []).includes(tabId);
}

async function loadUserDB() {
  // ── Check if user is banned by admin ──
  try {
    const metaSnap = await getDoc(doc(firestore, 'usersMeta', currentUser.uid));
    if(metaSnap.exists() && metaSnap.data().banned === true) {
      await signOut(auth);
      alert('החשבון שלך הוסר על ידי מנהל המערכת. צור קשר לפרטים נוספים.');
      return;
    }
  } catch(e){ console.warn('Ban check error', e); }

  updateUserMeta(currentUser).catch(()=>{});
  document.getElementById('loadingText').textContent='טוען נתונים…';
  document.getElementById('loadingScreen').style.display='flex';
  try {
    const snap = await getDoc(userDoc());
    if(snap.exists()) { db=snap.data(); ensureStructure(); }
    else { db=emptyDB(); await setDoc(userDoc(), db); }
    // Show onboarding for first-time users
    if(!db.settings.onboardingDone) {
      document.getElementById('loadingScreen').style.display='none';
      showOnboarding();
      return;
    }
    syncStatus='online';
  } catch(e) {
    console.warn('Load error',e);
    db=emptyDB();
    syncStatus='offline';
  }
  await loadAppConfig();
  document.getElementById('loadingScreen').style.display='none';
  render();

  // Live listener
  try {
    if(unsubscribe) unsubscribe();
    unsubscribe = onSnapshot(userDoc(), snap=>{
      if(snap.exists()){db=snap.data();ensureStructure();syncStatus='online';render();}
    });
  } catch(e){console.warn('Listener error',e);}
}

async function saveDB() {
  if(!currentUser||!db) return;
  if(saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async()=>{
    try {
      syncStatus='syncing'; updateSyncDot();
      await setDoc(userDoc(), db);
      syncStatus='online'; updateSyncDot();
    } catch(e) {
      console.warn('Save error',e);
      syncStatus='offline'; updateSyncDot();
    }
  }, 600);
}

// ── Helpers ───────────────────────────────────────────────
const CURRENCIES = {
  ILS: { symbol:'₪', name:'שקל', flag:'🇮🇱', rate:1 },
  USD: { symbol:'$', name:'דולר', flag:'🇺🇸', rate:0.27 },
  EUR: { symbol:'€', name:'יורו', flag:'🇪🇺', rate:0.25 },
  GBP: { symbol:'£', name:'פאונד', flag:'🇬🇧', rate:0.21 },
};

function getCurrency(scope) {
  if(!db||!db.settings) return 'ILS';
  if(scope==='personal2' && db.settings.partnerCurrency) return db.settings.partnerCurrency;
  return db.settings.currency||'ILS';
}
function getCurrencySymbol(code) {
  return (CURRENCIES[code||getCurrency()]||CURRENCIES.ILS).symbol;
}
// Convert any amount+currency to primary currency for totals
function toBase(amount, currency) {
  const from = CURRENCIES[currency||getCurrency()]||CURRENCIES.ILS;
  const to   = CURRENCIES[getCurrency()]||CURRENCIES.ILS;
  if(!amount) return 0;
  // Convert via ILS: amount / from.rate * to.rate... actually rates are ILS→foreign
  // rate = how many foreign per 1 ILS, so ILS = amount / rate
  return (amount / from.rate) * to.rate;
}
function fmt(n, currency) {
  const sym = getCurrencySymbol(currency);
  return sym + Math.round(Math.abs(n)).toLocaleString('he-IL');
}
function fmtFull(amount, currency) {
  const c = currency||getCurrency();
  const sym = getCurrencySymbol(c);
  const inBase = toBase(amount, c);
  const baseSym = getCurrencySymbol(getCurrency());
  if(c===getCurrency()) return sym+Math.round(amount).toLocaleString('he-IL');
  return `${sym}${Math.round(amount).toLocaleString('he-IL')} <span style="font-size:10px;color:#7b82a8">(≈${baseSym}${Math.round(inBase).toLocaleString('he-IL')})</span>`;
}
function currencySelect(id, val) {
  return `<select class="input" id="${id}" style="max-width:110px">
    ${Object.entries(CURRENCIES).map(([k,v])=>`<option value="${k}"${(val||getCurrency())===k?' selected':''}>${v.flag} ${v.symbol} ${v.name}</option>`).join('')}
  </select>`;
}
const uid = () => Date.now()+Math.random().toString(36).slice(2,7);
const cats = t => (db&&db.settings&&db.settings.cats&&db.settings.cats[t])||[];
const fixedTotal = t => (db.fixed[t]||[]).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
const varForMonth = (t,m,y) => (db.variable||[]).filter(e=>e.type===t&&e.month===m&&e.year===y);
const varTotal = (t,m,y) => varForMonth(t,m,y).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
const varForCat = (cat,m,y) => (db.variable||[]).filter(e=>e.category===cat&&e.month===m&&e.year===y);
const fixedForCat = cat => [...(db.fixed.personal||[]),...(db.fixed.family||[])].filter(e=>e.category===cat);
const incForMonth = (t,m,y) => (db.incomes||[]).filter(e=>e.type===t&&e.month===m&&e.year===y);
const incTotal = (t,m,y) => incForMonth(t,m,y).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
const totalExp = (m,y) => fixedTotal('personal')+fixedTotal('family')+varTotal('personal',m,y)+varTotal('family',m,y);
const totalInc = (m,y) => incTotal('personal',m,y)+incTotal('family',m,y);
const balance = (m,y) => totalInc(m,y)-totalExp(m,y);

function getAlerts(m,y){
  const alerts=[];
  Object.entries(db.settings.goals||{}).forEach(([cat,goal])=>{
    if(!goal)return;
    const spent=varForCat(cat,m,y).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0)+fixedForCat(cat).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
    if(spent>goal)alerts.push({cat,spent,goal});
  });
  return alerts;
}

// ── Budget helpers ────────────────────────────────────────
function getMonthBudget(type, m, y) {
  const key=`${y}-${m}-${type}`;
  const override=(db.monthBudgets||{})[key];
  if(override!==undefined&&override!==null) return override;
  return (db.settings.budget||{})[type]||0;
}
function getDaysInMonth(m,y){return new Date(y,m+1,0).getDate();}
function getDaysRemaining(m,y){
  if(m===today.getMonth()&&y===today.getFullYear()) return Math.max(0,getDaysInMonth(m,y)-today.getDate()+1);
  return 0;
}

// חישוב יתרה מצטברת מתחילת השנה עד חודש m (לא כולל)
function getExpForMonth(type, m, y) {
  return fixedTotal(type) + varTotal(type, m, y);
}

function getRolloverBalance(type, upToMonth, y) {
  const bud = (db&&db.settings&&db.settings.budget)||{};
  if(!bud.rollover) return 0;
  let accumulated = 0;
  for(let i=0; i<upToMonth; i++) {
    accumulated += getMonthBudget(type, i, y) - getExpForMonth(type, i, y);
  }
  return accumulated;
}

function getYearlyBudgetSummary(type, y) {
  const bud = (db&&db.settings&&db.settings.budget)||{};
  const yearlyFixed = type==='personal' ? (bud.personalYearly||0) : (bud.familyYearly||0);
  let totalBudget=0, totalExp=0;
  const months=[];
  for(let i=0; i<12; i++) {
    const mb = getMonthBudget(type, i, y);
    const exp = getExpForMonth(type, i, y);
    totalBudget += mb; totalExp += exp;
    months.push({month:i, budget:mb, exp, balance:mb-exp, cumulative:totalBudget-totalExp});
  }
  return { totalBudget: yearlyFixed||totalBudget, totalExp, balance: (yearlyFixed||totalBudget)-totalExp, months };
}
function buildBudgetBar(type, m, y){
  const budget=getMonthBudget(type,m,y);
  const bud=db.settings.budget||{};
  const rolloverOn=bud.rollover!==false;
  if(!budget&&!bud.rollover) return '';
  if(!budget) return '';
  const exp = type==='personal'
    ? fixedTotal('personal')+varTotal('personal',m,y)
    : fixedTotal('family')+varTotal('family',m,y);
  const rollover = rolloverOn ? getRolloverBalance(type, m, y) : 0;
  const effectiveBudget = budget + rollover; // תקציב חודש + גלישה מחודשים קודמים
  const pct=Math.min(100,Math.max(0,Math.round((exp/Math.max(effectiveBudget,1))*100)));
  const remaining=effectiveBudget-exp;
  const daysLeft=getDaysRemaining(m,y);
  const dailyAllowed=daysLeft>0?Math.round(remaining/daysLeft):0;
  const color=pct<70?'#68d391':pct<90?'#f6ad55':'#f87171';
  const bgColor=pct<70?'rgba(72,187,120,.08)':pct<90?'rgba(246,173,85,.08)':'rgba(239,68,68,.08)';
  const borderColor=pct<70?'rgba(72,187,120,.25)':pct<90?'rgba(246,173,85,.25)':'rgba(239,68,68,.25)';
  const icon=type==='personal'?'👤':'🏡';
  const lbl=type==='personal'?'אישי':'משפחה';
  return`<div style="background:${bgColor};border:1px solid ${borderColor};border-radius:14px;padding:14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-weight:700;font-size:13px">${icon} תקציב ${lbl}</div>
      <div style="font-size:12px;color:${color};font-weight:700">${pct}% נוצל</div>
    </div>
    <div style="background:#17171B;border-radius:8px;height:10px;overflow:hidden;margin-bottom:10px">
      <div style="height:10px;border-radius:8px;background:${color};width:${pct}%;transition:width .5s"></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
      <div style="background:#111113;border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:10px;color:#7b82a8;margin-bottom:2px">הוצאה עד כה</div>
        <div style="font-size:14px;font-weight:800;color:#f87171">${fmt(exp)}</div>
      </div>
      <div style="background:#111113;border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:10px;color:#7b82a8;margin-bottom:2px">נותר מהתקציב</div>
        <div style="font-size:14px;font-weight:800;color:${remaining>=0?color:'#f87171'}">${fmt(Math.abs(remaining))}${remaining<0?' ⚠️':''}</div>
      </div>
      ${daysLeft>0?`
      <div style="background:#111113;border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:10px;color:#7b82a8;margin-bottom:2px">ימים לסוף החודש</div>
        <div style="font-size:14px;font-weight:800;color:#0DD880">${daysLeft}</div>
      </div>
      <div style="background:#111113;border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:10px;color:#7b82a8;margin-bottom:2px">מותר ליום</div>
        <div style="font-size:14px;font-weight:800;color:${dailyAllowed>=0?'#63b3ed':'#f87171'}">${dailyAllowed>=0?fmt(dailyAllowed):'חרגת'}</div>
      </div>`:''}
    </div>
    ${rolloverOn&&rollover!==0?`<div style="margin-top:8px;background:${rollover>0?'rgba(72,187,120,.1)':'rgba(239,68,68,.1)'};border-radius:8px;padding:8px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:#7b82a8">גלישה מחודשים קודמים:</span>
      <span style="font-weight:700;font-size:13px;color:${rollover>0?'#68d391':'#f87171'}">${rollover>0?'+':''}${fmt(rollover)}</span>
    </div>`:''}
    ${pct>=100?`<div style="margin-top:8px;background:rgba(239,68,68,.15);border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#f87171;font-weight:700">⚠️ חרגת מהתקציב ב-${fmt(exp-effectiveBudget)}</div>`:''}
    <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:11px;color:#4a5068">תקציב חודש: <span style="color:#7b82a8;font-weight:600">${fmt(budget)}</span>${rollover!==0?` | אפקטיבי: <span style="color:${rollover>0?'#68d391':'#f87171'};font-weight:600">${fmt(effectiveBudget)}</span>`:''}</div>
      <button class="btn-edt" style="font-size:11px;padding:4px 10px" data-action="edit-month-budget" data-type="${type}">✏️ שנה</button>

function render(){window.renderApp=render;

  try {
    app.innerHTML=buildApp();
  } catch(err) {
    console.error('❌ buildApp error:', err);
    app.innerHTML=`<div style="padding:20px;color:#f87171;font-family:monospace;font-size:12px;background:#1a0a0a;border-radius:8px;margin:20px">
      <strong>שגיאת טעינה:</strong><br>${err.message}<br><br>
      <button onclick="location.reload()" style="padding:8px 16px;background:#0DD880;color:white;border:none;border-radius:6px;cursor:pointer">רענן</button>
    </div>`;
    return;
  }
  attach();
  updateSyncDot();
}

function initTheme() {
  const saved = localStorage.getItem('theme');
  if(saved === 'light') document.body.classList.add('light-mode');
}
window.toggleTheme = function() {
  const isLight = document.body.classList.toggle('light-mode');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  render();
};

function obGetText(key, ...args) {
  const texts = OB_TEXTS[_lang] || OB_TEXTS.he;
  const val = texts[key];
  if(typeof val === 'function') return val(...args);
  return val || (OB_TEXTS.he[key] || key);
}

window.obToggleCat = function(type, cat, el) {

  if(idx>=0) { arr.splice(idx,1); el.classList.remove('selected'); }

  const countEl = el.closest('.ob-card').querySelector('strong');

};

window.obData = obData;

window.obBack = function() {
  if(obStep > 0) { obStep--; renderObStep(); return; }
};

window.obNext = async function() {
  const step = OB_STEPS[obStep];
  // Validate
  if(step.id === 'profile') {
    // Name already collected in account_type step (obP1Name → obData.name)
    // Just save DOB and continue — DOB is optional
    const dobEl = document.getElementById('obDob');
    if(dobEl) obData.dob = dobEl.value;
  }
  if(step.id === 'budget') {
    const p = document.querySelector('[data-ob="budgetP"]');
    const f = document.querySelector('[data-ob="budgetF"]');
    if(p) obData.monthlyBudgetP = p.value;
    if(f) obData.monthlyBudgetF = f.value;
  }
  if(obStep < getOBSteps().length - 1) {
    obStep++;
    renderObStep();
    document.getElementById('obScreen').scrollTop = 0;
    return;
  }
  // Final step — apply to db and save
  await applyOnboarding();
};

async function applyOnboarding() {
  const btn = document.getElementById('obNextBtn');
  btn.textContent = obGetText('saving'); btn.disabled = true;

  // Build income types list
  const incomeTypes = OB_INCOME_TYPES
    .filter(t => obData.incomes[t.id]?.checked)
    .map(t => {
      const detail = obData.incomes[t.id]?.detail?.trim();
      const base = t.label.replace(/^[^\s]+ /,''); // strip emoji
      return detail ? `${base} — ${detail}` : base;
    });
  if(!incomeTypes.length) incomeTypes.push('משכורת');

  // Build merged personal categories (selected + deduped)
  const personalCats = [...new Set([...obData.catsPersonal])].filter(Boolean);
  const familyCats   = [...new Set([...obData.catsFamily])].filter(Boolean);

  // Apply to db
  db.settings.cats.personal   = personalCats;
  db.settings.cats.family     = familyCats;
  db.settings.incomeTypes     = incomeTypes;
  db.settings.budget.startDay = obData.budgetStartDay;
  if(obData.monthlyBudgetP) db.settings.budget.personal = parseFloat(obData.monthlyBudgetP)||0;
  if(obData.monthlyBudgetF) db.settings.budget.family   = parseFloat(obData.monthlyBudgetF)||0;
  // family_solo → internally treated as 'family' for tab structure, but no partner
  const finalAccountType = obData.accountType === 'family_solo' ? 'family' : obData.accountType;
  db.settings.profile = {
    name: obData.name.trim(),
    dob: obData.dob,
    accountType: finalAccountType,
    partnerName: obData.partnerName?.trim()||'',
    hasSoloFamily: obData.accountType === 'family_solo',
  };
  db.settings.currency = obData.currency||'ILS';
  db.settings.onboardingDone = true;
  if(obData.creditCards && obData.creditCards.length>0) db.creditCards = [...obData.creditCards];

  // Save financial goals
  if(obData.financialGoals) {
    db.settings.financialGoals = { ...obData.financialGoals };
    // Pre-fill monthly budget if user entered one
    if(obData.financialGoals.monthlyBudget > 0) {
      db.settings.budget.personal = obData.financialGoals.monthlyBudget;
    }
  }

  // Update display name
  try { if(currentUser.displayName !== obData.name) await updateProfile(currentUser, {displayName: obData.name.trim()}); } catch(e){}

  await saveDB();

  document.getElementById('obScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  S.tab = 'dashboard';
  render();
  showToast(obGetText('welcome', obData.name.trim()));
}

function calcSavingsTotal(s) { return calcSavingsCurrent(s); } function calcSavingsTotal_orig(s) {
  const now = new Date();
  const start = s.startDate ? new Date(s.startDate) : now;
  const end = s.endDate ? new Date(s.endDate) : now;
  const months = s.endDate
    ? Math.max(0, Math.round((end-start)/(1000*60*60*24*30)))
    : (s.months||0);
  if(s.monthly) return (s.monthly||0) * months + (s.extra||0);
  return (s.extra||0);
}

  const savePct = totalIncAll>0 ? Math.round((netAll/totalIncAll)*100) : 0;
  const budP = getMonthBudget('personal',m,y);
  const budF = getMonthBudget('family',m,y);
  const budTotal = budP+budF;
  const expPct = budTotal>0 ? Math.min(100,Math.round(totalExpAll/budTotal*100)) : -1;
  const status = expPct<0 ? '' : expPct<75 ? 'בטווח' : expPct<100 ? 'מתקרב לגבול' : 'חריגה';
  const statusColor = expPct<0 ? 'var(--text-3)' : expPct<75 ? 'var(--accent)' : expPct<100 ? 'var(--warn)' : 'var(--danger)';

  // Recent transactions (last 5)
  const recentTx = [...(db.variable||[])]
    .filter(e=>e.month===m&&e.year===y)
    .sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))
    .slice(0,5);

  // Per-user rows
  const userRows = [
    {label: hasPartner ? name1 : 'אישי', stype:'personal', color:'var(--accent)'},
    ...(hasPartner ? [{label:name2, stype:'personal2', color:'#93C5FD'}] : []),

    const inc = (db.incomes||[]).filter(e=>e.type===u.stype&&e.month===m&&e.year===y).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
    const exp = fixedTotal(u.stype) + varTotal(u.stype,m,y);
    return {...u, inc, exp, net:inc-exp};
  });

  return `<div style="display:flex;flex-direction:column;gap:0">

    ${alerts.length?`<div class="alert-banner" style="margin-bottom:20px">${alerts.map(a=>`${a.cat}: ${fmt(a.spent)} / ${fmt(a.goal)}`).join(' · ')}</div>`:''}

    <!-- ── HERO: Net balance ── -->
    <div style="padding:0 0 28px">
      <div style="font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">${MONTHS[m]} ${y} — יתרה נטו</div>
      <div class="hero-amount ${netAll>=0?'amount-neu':'amount-neg'}" style="margin-bottom:10px;color:${netAll>=0?'var(--text-1)':'var(--danger)'}">
        ${netAll>=0?'':'-'}${sym}${Math.abs(Math.round(netAll)).toLocaleString('he-IL')}
      </div>
      <div style="display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text-3)">
        <span>הכנסות <strong style="color:var(--text-2)">${sym}${Math.round(totalIncAll).toLocaleString('he-IL')}</strong></span>
        <span style="color:var(--border-hi)">·</span>
        <span>הוצאות <strong style="color:var(--text-2)">${sym}${Math.round(totalExpAll).toLocaleString('he-IL')}</strong></span>
        ${savePct>0?`<span style="color:var(--border-hi)">·</span><span>חיסכון <strong style="color:var(--accent)">${savePct}%</strong></span>`:''}
      </div>
    </div>

    <!-- ── BUDGET STATUS ── -->
    ${budTotal>0?`
    <div style="padding-bottom:28px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:12px;color:${statusColor};font-weight:600">${status}</span>
        <span style="font-size:11px;color:var(--text-3)">תקציב חודשי</span>
      </div>
      <div style="height:3px;background:var(--surface-hi);border-radius:2px;overflow:hidden">
        <div style="height:3px;border-radius:2px;width:${expPct}%;background:${statusColor};transition:width .6s ease"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text-3)">
        <span>${sym}${Math.round(totalExpAll).toLocaleString('he-IL')} ${expPct>=0?`(${expPct}%)`:''}</span>
        <span>${sym}${Math.round(budTotal).toLocaleString('he-IL')}</span>
      </div>
    </div>`:
    `<div style="padding-bottom:20px">
      <button data-action="goto-budget-settings" style="background:none;border:1px solid var(--border-hi);border-radius:8px;padding:8px 14px;color:var(--text-3);font-size:12px;cursor:pointer;font-family:'Heebo',sans-serif;transition:color .15s,border-color .15s" onmouseover="this.style.color='var(--text-1)'" onmouseout="this.style.color='var(--text-3)'">הגדר תקציב חודשי ←</button>
    </div>`}

    <!-- ── SEPARATOR ── -->
    <div style="height:1px;background:var(--border);margin-bottom:28px"></div>

    <!-- ── PER-USER BREAKDOWN ── -->
    ${userRows.length>1?`
    <div style="margin-bottom:28px">
      <div class="section-title">פירוט לפי חשבון</div>
      <div style="display:flex;flex-direction:column;gap:0">
        ${userRows.map(u=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:6px;height:6px;border-radius:50%;background:${u.color};flex-shrink:0"></div>

            </div>
            <div style="text-align:left">
              <div style="font-size:15px;font-weight:700;color:${u.net>=0?'var(--text-1)':'var(--danger)'}">${u.net>=0?'':'-'}${sym}${Math.abs(Math.round(u.net)).toLocaleString('he-IL')}</div>
              <div style="font-size:11px;color:var(--text-3)">${sym}${Math.round(u.inc).toLocaleString('he-IL')} / ${sym}${Math.round(u.exp).toLocaleString('he-IL')}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`:''}

    <!-- ── RECENT TRANSACTIONS ── -->
    ${recentTx.length?`
    <div style="margin-bottom:28px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="section-title" style="margin-bottom:0">תנועות אחרונות</div>
        <button data-tab="personal" style="background:none;border:none;color:var(--text-3);font-size:11px;cursor:pointer;font-family:'Heebo',sans-serif" onmouseover="this.style.color='var(--text-1)'" onmouseout="this.style.color='var(--text-3)'">הכל ←</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:0">
        ${recentTx.map(tx=>`

              <div style="font-size:11px;color:var(--text-3)">${tx.category||''}${tx.date?' · '+tx.date:''}</div>
            </div>
            <div style="font-size:15px;font-weight:700;color:var(--danger);margin-right:4px;flex-shrink:0">−${sym}${Math.round(toBase(tx.amount||0,tx.currency)).toLocaleString('he-IL')}</div>
          </div>`).join('')}
      </div>

    `<div style="padding:20px 0;text-align:center;color:var(--text-3);font-size:13px">
      אין תנועות עדיין — <button data-action="open-variable" data-type="personal" style="background:none;border:none;color:var(--accent);cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px">הוסף הוצאה ראשונה</button>
    </div>`}

    <!-- ── GOAL BARS ── -->

  </div>`;
}
function buildGoalBars(m,y){
  const entries=Object.entries(db.settings.goals||{}).filter(([,g])=>g>0);
  if(!entries.length)return'';
  return`<div class="card"><div class="section-title">יעדי תקציב — ${MONTHS[m]}</div>${entries.map(([cat,goal])=>{
    const spent=varForCat(cat,m,y).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0)+fixedForCat(cat).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
    const pct=Math.min(100,Math.round(spent/goal*100));
    const cls=pct<75?'goal-ok':pct<100?'goal-warn':'goal-over';
    return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${cat}</span><span style="color:#7b82a8">${fmt(spent)}/${fmt(goal)}</span></div>
    <div class="goal-bar-wrap"><div class="goal-bar ${cls}" style="width:${pct}%"></div></div>
    <div class="goal-label"><span>${pct}% נוצל</span>${pct>=100?`<span style="color:#f87171">חרגת ב-${fmt(spent-goal)}</span>`:''}</div></div>`;
  }).join('')}</div>`;
}

function buildScopeIncome(type, m, y) {
  const scopeType = type==='family'?'family':type==='personal2'?'personal2':'personal';
  const incList = (db.incomes||[]).filter(e=>e.month===m&&e.year===y&&e.type===scopeType);
  const total = incList.reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
  const sym = getCurrencySymbol(getCurrency(scopeType));
  let rows;
  if(incList.length) {
    const trs = incList.map(e=>'<tr><td style="font-weight:600">'+e.name+'</td><td><span style="font-size:11px;background:rgba(104,211,145,.15);color:#68d391;border-radius:4px;padding:2px 6px">'+(e.incomeType||'')+'</span></td><td style="color:#68d391;font-weight:700">+'+fmt(toBase(e.amount||0,e.currency))+'</td><td><div style="display:flex;gap:4px"><button class="btn-edt" data-action="edit-income" data-id="'+e.id+'">✏️</button><button class="btn-del" data-action="del-income" data-id="'+e.id+'">🗑</button></div></td></tr>').join('');
    rows = '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>שם</th><th>סוג</th><th>סכום</th><th></th></tr></thead><tbody>'+trs+'</tbody></table></div><div class="total-row">סה״כ הכנסות: '+fmt(total)+' '+sym+'</div>';
  } else {
    rows = '<div class="empty">אין הכנסות לחודש זה</div>';
  }
  return '<div class="card" style="margin-top:12px"><div class="add-row"><div><div class="section-title" style="margin-bottom:2px">💵 הכנסות — '+MONTHS[m]+'</div><div style="color:#7b82a8;font-size:11px">הכנסות חודשיות</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn-excel" data-action="open-excel-import" data-type="income">📊 ייבא מאקסל</button><button class="btn btn-primary" data-action="open-income">+ הוסף הכנסה</button></div></div>'+rows+'</div>';
}


function buildReport(){
  const m=S.month,y=S.year;
  const rMode  = S.reportMode  || 'monthly';
  const rScope = S.reportScope || 'personal';
  const rChart = S.reportChart || 'pie';
  const p = db.settings.profile||{};
  const isFamily  = p.accountType==='family';
  const hasPartner= isFamily&&p.partnerName&&!p.hasSoloFamily;
  const name1=p.name||'אישי', name2=p.partnerName||'אישי 2';

  // Scope options shown to user
  const scopeOpts=[
    {id:'personal',  label:'👤 '+(hasPartner?name1:'אישי')},
    ...(hasPartner  ? [{id:'personal2', label:'👤 '+name2}] : []),
    ...(isFamily    ? [{id:'family',    label:'🏡 משפחה'}]  : []),
    ...(isFamily    ? [{id:'all',       label:'🔀 הכל'}]     : []),
  ];

  // ── Scoped data helpers ──
  function scopeInc(mo,yr){
    if(rScope==='family')    return incTotal('family',mo,yr);
    if(rScope==='personal2') return (db.incomes||[]).filter(e=>e.type==='personal2'&&e.month===mo&&e.year===yr).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
    if(rScope==='all')       return totalInc(mo,yr);
    return incTotal('personal',mo,yr);
  }
  function scopeFixedArr(){
    if(rScope==='family')    return db.fixed.family||[];
    if(rScope==='personal2') return db.fixed.personal2||[];
    if(rScope==='all')       return [...(db.fixed.personal||[]),...(db.fixed.personal2||[]),...(db.fixed.family||[])];
    return db.fixed.personal||[];
  }
  function scopeVarRows(mo,yr){
    if(rScope==='all') return (db.variable||[]).filter(e=>e.month===mo&&e.year===yr);
    return (db.variable||[]).filter(e=>e.type===rScope&&e.month===mo&&e.year===yr);
  }
  function scopeExp(mo,yr){
    return scopeFixedArr().reduce((s,e)=>s+toBase(e.amount||0,e.currency),0)
         + scopeVarRows(mo,yr).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
  }

  const curInc=scopeInc(m,y), curExp=scopeExp(m,y), curBal=curInc-curExp;
  const savePct=curInc>0?Math.round((curBal/curInc)*100):0;
  const prevM=m===0?11:m-1, prevY=m===0?y-1:y;
  const expDiff=(()=>{const p=scopeExp(prevM,prevY);return p>0?Math.round(((curExp-p)/p)*100):0;})();

  const yearlyData=MONTHS.map((_,i)=>({
    month:MONTHS[i], inc:scopeInc(i,y), exp:scopeExp(i,y)
  }));
  yearlyData.forEach(d=>d.bal=d.inc-d.exp);
  const yearInc=yearlyData.reduce((s,d)=>s+d.inc,0);
  const yearExp=yearlyData.reduce((s,d)=>s+d.exp,0);
  const yearBal=yearInc-yearExp;
  const monthAvgExp=Math.round(yearExp/12);
  const maxExpMonth=yearlyData.reduce((a,b)=>b.exp>a.exp?b:a,yearlyData[0]);
  const minExpMonth=yearlyData.filter(d=>d.exp>0).reduce((a,b)=>b.exp<a.exp?b:a,yearlyData.find(d=>d.exp>0)||yearlyData[0]);

  const catMap={};
  scopeVarRows(m,y).forEach(e=>{catMap[e.category]=(catMap[e.category]||0)+toBase(e.amount||0,e.currency);});
  scopeFixedArr().forEach(e=>{catMap[e.category]=(catMap[e.category]||0)+toBase(e.amount||0,e.currency);});
  const catEntries=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const top5=[...scopeVarRows(m,y),...scopeFixedArr()].sort((a,b)=>toBase(b.amount||0,b.currency)-toBase(a.amount||0,a.currency)).slice(0,5);

  const COLORS=['#0DD880','#f87171','#68d391','#f6ad55','#63b3ed','#f472b6','#0DD880','#34d399','#fbbf24','#60a5fa'];

  function buildPie(){
    if(!catEntries.length)return`<div class="empty">אין נתונים</div>`;
    const total=catEntries.reduce((s,[,v])=>s+v,0);
    let angle=0;
    const slices=catEntries.map(([cat,val],i)=>{
      const pct=val/total, sweep=pct*360;
      const r=80, cx=100, cy=100;
      const a1=angle*Math.PI/180, a2=(angle+sweep)*Math.PI/180;
      const x1=cx+r*Math.sin(a1), y1=cy-r*Math.cos(a1);
      const x2=cx+r*Math.sin(a2), y2=cy-r*Math.cos(a2);
      const lg=sweep>180?1:0;
      const d=`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} Z`;
      angle+=sweep;
      return{d,color:COLORS[i%COLORS.length],cat,val,pct:Math.round(pct*100)};
    });
    return`<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <svg width="200" height="200" viewBox="0 0 200 200" style="flex-shrink:0">
        ${slices.map(s=>`<path d="${s.d}" fill="${s.color}" opacity="0.9"><title>${s.cat}: ${fmt(s.val)}</title></path>`).join('')}

        <text x="100" y="97" text-anchor="middle" fill="#e8eaf0" font-size="11" font-family="Heebo">הוצאות</text>
        <text x="100" y="112" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold" font-family="Heebo">${fmt(total)}</text>
      </svg>
      <div style="flex:1;min-width:130px">
        ${slices.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

  }

  // ── Bar chart SVG ──
  function buildBar(){
    const maxVal=Math.max(...yearlyData.map(d=>Math.max(d.inc,d.exp)),1);
    const W=320,H=140,barW=10,gap=14,pad=8;
    return`<div style="overflow-x:auto"><svg width="${Math.max(W,MONTHS.length*(barW*2+gap)+pad*2)}" height="${H+50}" viewBox="0 0 ${Math.max(W,MONTHS.length*(barW*2+gap)+pad*2)} ${H+50}">
      ${yearlyData.map((d,i)=>{
        const x=pad+i*(barW*2+gap);
        const incH=Math.round((d.inc/maxVal)*(H-20));
        const expH=Math.round((d.exp/maxVal)*(H-20));
        const isCur=i===m;
        return`<g>
          <rect x="${x}" y="${H-incH}" width="${barW}" height="${incH}" fill="${isCur?'#48bb78':'#2d6a4f'}" rx="2" opacity="${isCur?1:0.7}"><title>${d.month} הכנסות: ${fmt(d.inc)}</title></rect>
          <rect x="${x+barW+1}" y="${H-expH}" width="${barW}" height="${expH}" fill="${isCur?'#f87171':'#7f3f3f'}" rx="2" opacity="${isCur?1:0.7}"><title>${d.month} הוצאות: ${fmt(d.exp)}</title></rect>
          <text x="${x+barW}" y="${H+14}" text-anchor="middle" fill="${isCur?'#0DD880':'#4a5068'}" font-size="9" font-family="Heebo">${MONTHS[i].slice(0,3)}</text>
        </g>`;
      }).join('')}
      <line x1="${pad}" y1="${H}" x2="${Math.max(W,MONTHS.length*(barW*2+gap)+pad*2)-pad}" y2="${H}" stroke="#252836" stroke-width="1"/>
    </svg></div>
    <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:#7b82a8">
      <span><span style="display:inline-block;width:10px;height:10px;background:#48bb78;border-radius:2px;margin-left:4px"></span>הכנסות</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#f87171;border-radius:2px;margin-left:4px"></span>הוצאות</span>
    </div>`;
  }

  // ── Line chart SVG ──
  function buildLine(){
    const maxVal=Math.max(...yearlyData.map(d=>Math.abs(d.bal)),1);
    const W=300,H=120,pad=20;
    const pts=yearlyData.map((d,i)=>{
      const x=pad+i*(W-pad*2)/11;
      const y=H/2-(d.bal/maxVal)*(H/2-10);
      return{x,y,bal:d.bal,month:MONTHS[i]};
    });
    const pathD=pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
    const areaD=`${pathD} L${pts[pts.length-1].x},${H/2} L${pts[0].x},${H/2} Z`;
    return`<svg width="100%" height="${H+30}" viewBox="0 0 ${W} ${H+30}" preserveAspectRatio="xMidYMid meet">
      <defs><linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0DD880" stop-opacity="0.3"/><stop offset="100%" stop-color="#0DD880" stop-opacity="0"/></linearGradient></defs>
      <line x1="${pad}" y1="${H/2}" x2="${W-pad}" y2="${H/2}" stroke="#252836" stroke-width="1" stroke-dasharray="4,4"/>
      <path d="${areaD}" fill="url(#lineGrad)"/>
      <path d="${pathD}" fill="none" stroke="#0DD880" stroke-width="2" stroke-linejoin="round"/>
      ${pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="${i===m?5:3}" fill="${p.bal>=0?'#68d391':'#f87171'}" stroke="#161922" stroke-width="1.5"><title>${p.month}: ${fmt(p.bal)}</title></circle>`).join('')}
      ${pts.map((p,i)=>`<text x="${p.x}" y="${H+22}" text-anchor="middle" fill="${i===m?'#0DD880':'#3a4060'}" font-size="8" font-family="Heebo">${MONTHS[i].slice(0,3)}</text>`).join('')}
    </svg>
    <div style="font-size:11px;color:#7b82a8;text-align:center;margin-top:4px">יתרה חודשית (ירוק=חיובי, אדום=גירעון)</div>`;
  }


  return `<div>
    <!-- Scope selector -->
    ${scopeOpts.length>1?`
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${scopeOpts.map(o=>`<button class="btn ${rScope===o.id?'btn-primary':'btn-ghost'}"
        style="font-size:13px;padding:8px 14px" data-rscope="${o.id}">${o.label}</button>`).join('')}
    </div>`:''}

    <!-- Mode + Chart type -->
    <div class="card" style="padding:10px;margin-bottom:12px">
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        ${[['monthly','📅 חודשי'],['yearly','📆 שנתי'],['combined','🔀 מוצלב']].map(([id,lbl])=>`
          <button class="btn ${rMode===id?'btn-primary':'btn-ghost'}" style="font-size:12px;padding:7px 12px"
            data-rmode="${id}">${lbl}</button>`).join('')}
        <div style="margin-right:auto;display:flex;gap:5px">
          ${[['pie','🥧'],['bar','📊'],['line','📈']].map(([id,ic])=>`
