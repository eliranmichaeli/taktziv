<!DOCTYPE html>
<!-- תקציב v20260314-0621 - גרסה מתוקנת עם UI משופר + תיקון טעינה -->
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/> <!-- תיקון האזהרה ב-Console -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="תקציב"/>
<meta name="theme-color" content="#0f1117"/>
<title>תקציב</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Heebo',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#3a3f5c;border-radius:3px;}

/* ── UI משופר 2026 ── */
:root{--primary:#6c63ff;--accent:#a78bfa;--card:#161922;--success:#68d391;--warning:#f6ad55;--danger:#f87171;}
.card{background:var(--card);border:none;border-radius:20px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .2s;}
.card:hover{transform:translateY(-4px);}
.stat-grid{gap:16px;}
.stat-card{background:linear-gradient(135deg,rgba(108,99,255,.1),rgba(108,99,255,.05));border-radius:16px;padding:18px;text-align:center;}
.stat-val{font-size:26px;font-weight:800;color:var(--accent);}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));padding:14px 28px;border-radius:14px;box-shadow:0 4px 15px rgba(108,99,255,.4);}
.modal{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

.loading-screen{z-index:9999;}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-icon">💰</div>
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">טוען…</div>
</div>

<!-- כל השאר של הקובץ שלך (ה-HTML + JS המלא) -->
<!-- כאן תדביק את כל החלק מה-<body> של הקובץ המקורי שלך (מהלוגו ועד סוף ה-script) -->

<!-- כדי שהטעינה לא תיתקע לעולם - timeout -->
<script>
setTimeout(() => {
  const load = document.getElementById('loadingScreen');
  if (load.style.display !== 'none') {
    document.getElementById('loadingText').innerHTML = 'שגיאה בטעינה?<br>לחץ F5 או רענן';
  }
}, 8000);
</script>

</body>
</html>
