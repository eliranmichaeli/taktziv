              data-rchart="${id}">${ic}</button>`).join('')}
        </div>
      </div>
    </div>

    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
      <div class="card" style="text-align:center;padding:12px">
        <div style="font-size:10px;color:#7b82a8;margin-bottom:4px">${rMode==='yearly'?'הכנסות שנתי':'הכנסות'}</div>
        <div style="font-weight:800;font-size:14px;color:#68d391">+${fmt(rMode==='yearly'?yearInc:curInc)}</div>
      </div>
      <div class="card" style="text-align:center;padding:12px">
        <div style="font-size:10px;color:#7b82a8;margin-bottom:4px">${rMode==='yearly'?'הוצאות שנתי':'הוצאות'}</div>
        <div style="font-weight:800;font-size:14px;color:#f87171">-${fmt(rMode==='yearly'?yearExp:curExp)}</div>
      </div>
      <div class="card" style="text-align:center;padding:12px">
        <div style="font-size:10px;color:#7b82a8;margin-bottom:4px">מאזן</div>
        <div style="font-weight:800;font-size:${Math.abs(rMode==='yearly'?yearBal:curBal)>99999?'11':'14'}px;color:${(rMode==='yearly'?yearBal:curBal)>=0?'#68d391':'#f87171'}">
          ${(rMode==='yearly'?yearBal:curBal)>=0?'+':''}${fmt(rMode==='yearly'?yearBal:curBal)}
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="card" style="margin-bottom:12px">
      <div class="section-title" style="margin-bottom:12px">
        ${rChart==='pie'?'🥧 פילוח קטגוריות':rChart==='bar'?'📊 השוואה חודשית':'📈 מגמת הוצאות'}
      </div>
      ${rChart==='pie'?buildPie():rChart==='bar'?buildBar():buildLine()}

    <!-- Yearly stats -->
    ${rMode==='yearly'?`
    <div class="card" style="margin-bottom:12px">
      <div class="section-title">📋 סיכום ${y}</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #252836">
          <span style="color:#7b82a8">ממוצע חודשי</span><span style="font-weight:700">${fmt(monthAvgExp)}</span>

        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #252836">

      </div>
    </div>`:''}

    <!-- Monthly breakdown -->
    ${rMode!=='yearly'?`
    <div class="card" style="margin-bottom:12px">
      <div class="section-title">📋 ${MONTHS[m]} ${y}</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #252836">
          <span style="color:#7b82a8">שיעור חיסכון</span>
          <span style="font-weight:700;color:${savePct>=20?'#68d391':savePct>=10?'#f6ad55':'#f87171'}">${savePct}%</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:6px 0">
          <span style="color:#7b82a8">שינוי לעומת חודש קודם</span>
          <span style="font-weight:700;color:${expDiff<=0?'#68d391':'#f87171'}">${expDiff>0?'+':''}${expDiff}%</span>
        </div>
      </div>
    </div>
    <!-- Top 5 -->
    <div class="card">
      <div class="section-title">הוצאות גדולות — ${MONTHS[m]}</div>

}

function calcHealthScore(m, y) {
  const inc = totalInc(m,y);
  const exp = totalExp(m,y);
  const budP = getMonthBudget('personal',m,y)||0;
  const budF = getMonthBudget('family',m,y)||0;
  const bud  = budP+budF;
  const sav  = (db.savings||[]).reduce((s,x)=>s+(x.monthly||0),0);

  let score = 50;
  // Savings rate
  if(inc>0) {
    const savRate = sav/inc;
    if(savRate>=0.2) score+=20;
    else if(savRate>=0.1) score+=12;
    else if(savRate>0) score+=5;
  }
  // Budget adherence
  if(bud>0) {
    const used=exp/bud;
    if(used<=0.8) score+=20;
    else if(used<=1.0) score+=10;
    else if(used<=1.2) score-=5;
    else score-=15;
  }
  // Positive balance
  if(inc>0) {
    const bal=(inc-exp)/inc;
    if(bal>=0.3) score+=10;
    else if(bal>=0.1) score+=5;
    else if(bal<0) score-=15;
  }
  // Has savings plans
  if((db.savings||[]).length>0) score+=5;
  // Categories with goals met
  const goalsMet = Object.entries(db.settings.goals||{}).filter(([cat,goal])=>{
    const spent=varForCat(cat,m,y).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0)
               +fixedForCat(cat).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
    return goal>0 && spent<=goal;
  }).length;
  score+=Math.min(10,goalsMet*2);

  return Math.max(0,Math.min(100,Math.round(score)));
}

function healthScoreColor(score) {
  if(score>=80) return '#68d391';
  if(score>=60) return '#f6ad55';
  if(score>=40) return '#fc8181';
  return '#f87171';
}
function healthScoreLabel(score) {
  if(score>=80) return 'מצוין';
  if(score>=60) return 'טוב';
  if(score>=40) return 'לשיפור';
  return 'דורש תשומת לב';
}

function buildHealthScoreCard(m,y) {
  const score = calcHealthScore(m,y);
  const color = healthScoreColor(score);
  const label = healthScoreLabel(score);
  const inc=totalInc(m,y), exp=totalExp(m,y), bal=inc-exp;
  const bud=getMonthBudget('personal',m,y)+getMonthBudget('family',m,y);
  const sym=getCurrencySymbol();

  // Budget alerts
  const alerts=[];
  ['personal','family'].forEach(type=>{
    const b=getMonthBudget(type,m,y);
    if(!b) return;
    const e=fixedTotal(type)+varTotal(type,m,y);
    const pct=Math.round(e/b*100);
    const typeName=type==='personal'?'אישי':'משפחה';
    if(pct>=100) alerts.push({level:'danger',msg:`⚠️ חרגת מהתקציב ${typeName} ב-${fmt(e-b)} (${pct}%)`});
    else if(pct>=80) alerts.push({level:'warn',msg:`🔔 השתמשת ב-${pct}% מהתקציב ${typeName}`});
  });
  // Check specific category goals
  Object.entries(db.settings.goals||{}).forEach(([cat,goal])=>{
    if(!goal) return;
    const spent=varForCat(cat,m,y).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0)
               +fixedForCat(cat).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
    const pct=Math.round(spent/goal*100);
    if(pct>=90) alerts.push({level:pct>=100?'danger':'warn',msg:`${pct>=100?'⚠️':'🔔'} ${cat}: ${pct}% מהיעד`});
  });

  return `<div class="card" style="background:linear-gradient(135deg,rgba(13,216,128,.08),rgba(13,216,128,.04));border:1px solid rgba(13,216,128,.2);margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div>
        <div style="font-size:13px;color:#7b82a8;margin-bottom:2px">ציון בריאות פיננסית</div>
        <div style="font-size:12px;color:${color}">${label}</div>
      </div>
      <div style="position:relative;width:68px;height:68px">
        <svg width="68" height="68" style="transform:rotate(-90deg)">
          <circle cx="34" cy="34" r="28" fill="none" stroke="#252836" stroke-width="7"/>
          <circle cx="34" cy="34" r="28" fill="none" stroke="${color}" stroke-width="7"
            stroke-dasharray="${Math.round(2*Math.PI*28)}"
            stroke-dashoffset="${Math.round(2*Math.PI*28*(1-score/100))}"
            stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:17px;font-weight:800;color:${color}">${score}</div>
      </div>
    </div>
    ${alerts.length?`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">

}

function buildAIAdvisorModal() {
  return `<div class="overlay" id="overlay"><div class="modal" style="max-height:90vh;overflow-y:auto">
    <div class="modal-title">🤖 יועץ פיננסי AI</div>

      <div style="text-align:center;padding:30px 0;color:#7b82a8">
        <div style="font-size:32px;margin-bottom:10px">🤖</div>
        <div>לחץ על "נתח את התקציב שלי" לקבלת ייעוץ מותאם אישית</div>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn btn-ghost" data-action="close-modal">סגור</button>
      <button class="btn btn-primary" data-action="run-ai-advisor" style="flex:1">✨ נתח את התקציב שלי</button>
    </div>
  </div></div>`;

async function runAIAdvisor(m, y) {
  const el = document.getElementById('aiResult');
  if(!el) return;
  el.innerHTML = '<div style="text-align:center;padding:20px;color:#0DD880"><div class="spinner" style="width:28px;height:28px;margin:0 auto 12px"></div>מנתח את התקציב שלך…</div>';

  const inc = totalInc(m,y);
  const expP = fixedTotal('personal')+varTotal('personal',m,y);
  const expF = fixedTotal('family')+varTotal('family',m,y);
  const budP = getMonthBudget('personal',m,y)||0;
  const budF = getMonthBudget('family',m,y)||0;
  const savPlans = (db.savings||[]).map(s=>`${s.name}: ${fmt(s.monthly||0)}/חודש (יעד: ${s.target?fmt(s.target):'ללא'})`).join(', ');
  const topCats = Object.entries(db.settings.goals||{}).slice(0,5).map(([c,g])=>`${c}: יעד ${fmt(g)}`).join(', ');
  const score = calcHealthScore(m,y);
  const sym = getCurrencySymbol();
  const name = db.settings.profile?.name||'';

  const prompt = `אתה יועץ פיננסי ישראלי מומחה. ענה בעברית בלבד, בסגנון חם ואישי. 
  
נתונים פיננסיים של ${name||'המשתמש'} עבור ${MONTHS[m]} ${y}:
- הכנסה כוללת: ${fmt(inc)} ${sym}
- הוצאות אישיות: ${fmt(expP)} ${sym} (תקציב: ${fmt(budP)})
- הוצאות משפחה: ${fmt(expF)} ${sym} (תקציב: ${fmt(budF)})
- יתרה: ${fmt(inc-expP-expF)} ${sym}
- ציון בריאות פיננסית: ${score}/100
- תוכניות חיסכון: ${savPlans||'אין'}
- יעדי קטגוריות: ${topCats||'לא הוגדרו'}
- מטבע: ${getCurrency()}

תן ניתוח קצר ב-3-4 נקודות בודות עם:
1. מה עושה טוב
2. מה לשפר (ספציפי!)
3. טיפ מעשי אחד לחודש הבא
השתמש בסמלי emoji להמחשה. היה ספציפי לנתונים. אל תתן אזהרות משפטיות.`;

  try {
    const resp = await fetch('/.netlify/functions/claude', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:800,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await resp.json();
    const text = data.content?.[0]?.text||'לא הצלחתי לנתח, נסה שוב';
    el.innerHTML = `<div style="white-space:pre-wrap;line-height:1.8">${text}</div>
      <div style="margin-top:12px;font-size:11px;color:#7b82a8;border-top:1px solid #252836;padding-top:8px">
        💡 הייעוץ מבוסס על הנתונים שהזנת. אינו תחליף לייעוץ פיננסי מקצועי.
      </div>`;
  } catch(e) {
    el.innerHTML = '<div style="color:#f87171;text-align:center;padding:20px">❌ שגיאה בקשר ל-AI. נסה שוב.</div>';
  }
}

function getTaskKey(m, y) { return `${y}-${m}`; }

function buildTasks() {
  const m = S.month, y = S.year;
  const key = getTaskKey(m, y);
  const data = db.tasks[key] || { tasks: [], goals: [] };
  const tasks = data.tasks || [];
  const goals = data.goals || [];

  // Check previous month for unfinished items
  const prevM = m === 0 ? 11 : m - 1;
  const prevY = m === 0 ? y - 1 : y;
  const prevKey = getTaskKey(prevM, prevY);
  const prevData = db.tasks[prevKey] || {};
  const prevUnfinishedTasks = (prevData.tasks||[]).filter(t=>!t.done && !t.rolledOver);
  const prevUnfinishedGoals = (prevData.goals||[]).filter(g=>!g.done && !g.rolledOver);

  const doneT = tasks.filter(t=>t.done).length;
  const doneG = goals.filter(g=>g.done).length;

  return `<div>

    <div class="card" style="background:rgba(246,173,85,.07);border:1px solid rgba(246,173,85,.25);margin-bottom:14px">

            <button class="btn-del" data-action="dismiss-prev" data-key="${prevKey}" data-id="${t.id}" data-type="task">✕</button>

      ${tasks.length ? `
        <div>
          ${tasks.map(t=>`
            <div class="row-line" style="opacity:${t.done?'0.5':'1'}">

                  ${t.done?'✓':''}

// 💸 CASHFLOW TAB — תזרים מזומנים
// ══════════════════════════════════════════════════
function buildCashflow(scope) {
  const p = db.settings.profile||{};
  const isFamily = p.accountType==='family';
  const name1 = p.name||'אישי';
  const name2 = p.partnerName||'אישי 2';
  const scopeLabel = scope==='personal'  ? (isFamily&&p.partnerName ? name1 : 'אישי')
                   : scope==='personal2' ? name2 : 'משפחתי';
  const dbType = scope==='personal2' ? 'personal' : scope==='family' ? 'family' : 'personal';

  const now = new Date();
  const curM = now.getMonth(), curY = now.getFullYear();

  // Opening balance
  const openingBal = parseFloat((db.cashflow?.openingBalance||{})[scope]) || 0;

  // ── helper: compute one month ──
  function computeMonth(m, y, prevBal) {
    // Incomes
    const incList = (db.incomes||[]).filter(e => {
      if(scope==='family') return e.type==='family' && e.month===m && e.year===y;
      return e.type!=='family' && e.month===m && e.year===y;
    });
    const income = incList.reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);

    // Fixed expenses (always apply every month)
    const fixedExp = (db.fixed[dbType]||[]).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);

    // Variable expenses — normal + standing_order projected
    const varList = (db.variable||[]).filter(e=>e.type===dbType && e.month===m && e.year===y);
    const varExp = varList.reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);

    // Standing orders from variable (project forward if no entry yet for that month)
    // Find all standing_order entries from past and project them
    const soIds = new Set();
    const standingOrders = (db.variable||[]).filter(e=>e.type===dbType && e.paymentType==='standing_order');
    // For each unique standing order name, project to current month if no entry exists
    const soNames = [...new Set(standingOrders.map(e=>e.name))];
    let soProjected = 0;
    soNames.forEach(name=>{
      const existing = (db.variable||[]).find(e=>e.type===dbType&&e.name===name&&e.month===m&&e.year===y);
      if(!existing) {
        // Find most recent entry for this SO
        const latest = standingOrders.filter(e=>e.name===name).sort((a,b)=>(b.year*12+b.month)-(a.year*12+a.month))[0];
        if(latest) soProjected += toBase(latest.amount||0, latest.currency);
      }
    });

    // Credit card charges: charges that hit account this month
    // = expenses from PREVIOUS month (variable) + standing orders (fixed) charged to cards
    const cardCharges = [];
    const prevM = m===0?11:m-1, prevY = m===0?y-1:y;

    // Group all charged expenses by card
    const chargeMap = {};
    // Variable expenses from prev month on a card
    (db.variable||[]).filter(e=>e.cardId&&e.month===prevM&&e.year===prevY&&e.type===dbType).forEach(e=>{
      const card = (db.creditCards||[]).find(c=>c.id===e.cardId);
      const day = card?.billingDay;
      if(!day) return; // no billing day = charged directly, no deferral
      if(!chargeMap[e.cardId]) chargeMap[e.cardId]={card,items:[],total:0};
      chargeMap[e.cardId].items.push(e.name);
      chargeMap[e.cardId].total += toBase(e.amount||0,e.currency);
    });
    // Fixed standing orders: charged on their specific billingDay
    (db.fixed[dbType]||[]).filter(e=>e.isStandingOrder&&e.cardId).forEach(e=>{
      const card = (db.creditCards||[]).find(c=>c.id===e.cardId);
      const day = e.billingDay || card?.billingDay;
      if(!day) return;
      if(!chargeMap[e.cardId]) chargeMap[e.cardId]={card,items:[],total:0};
      chargeMap[e.cardId].items.push(e.name+' (ה.ק.)');
      chargeMap[e.cardId].total += toBase(e.amount||0,e.currency);
    });
    Object.values(chargeMap).forEach(({card,items,total})=>{
      if(total>0) cardCharges.push({card,total,items});
    });

    // Total outgoing: fixed + variable (current month cash payments) + card charges
    // Avoid double counting: if expense is on a card, it's counted when card charges, not when purchased
    const directVarExp = varList.filter(e=>!e.cardId||!(db.creditCards||[]).find(c=>c.id===e.cardId&&c.billingDay))
                                .reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
    const directFixedExp = (db.fixed[dbType]||[]).filter(e=>!e.cardId||!(db.creditCards||[]).find(c=>c.id===e.cardId&&c.billingDay))
                                                  .reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
    const cardTotal = cardCharges.reduce((s,c)=>s+c.total,0);
    const totalOut = directFixedExp + directVarExp + soProjected + cardTotal;

    const balance = prevBal + income - totalOut;
    return {m, y, income, fixedExp:directFixedExp, varExp:directVarExp, soProjected, cardCharges, cardTotal, totalOut, prevBal, balance};
  }

  // Build 7 months: 1 past + current + 5 future
  let bal = openingBal;
  const rows = [];
  for(let i=-1; i<=5; i++){
    let m=curM+i, y=curY;
    if(m<0){m+=12;y--;} else if(m>11){m-=12;y++;}
    const row = computeMonth(m, y, bal);
    row.isCurrent = (i===0);
    row.isPast = (i<0);
    rows.push(row);
    bal = row.balance;
  }
  const cur = rows[1]; // current month

  const balColor = n => n>=0 ? '#68d391' : '#f87171';
  const CHART_H = 80;
  const maxAbs = Math.max(...rows.map(r=>Math.abs(r.balance)),1);
  const barW = Math.floor(100/rows.length);

  // Scope selector options
  const scopeOptions = [['personal', isFamily&&p.partnerName ? name1 : 'אישי']];
  if(isFamily && p.partnerName && !p.hasSoloFamily) scopeOptions.push(['personal2', name2]);
  if(isFamily) scopeOptions.push(['family','משפחתי']);

  return `<div>
    <!-- ── SCOPE SELECTOR ── -->
    ${scopeOptions.length>1?`
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      ${scopeOptions.map(([v,l])=>`
        <button class="btn ${scope===v?'btn-primary':'btn-ghost'}" style="flex:1;font-size:13px"
          data-action="set-cashflow-scope" data-scope="${v}">${l}</button>`).join('')}
    </div>`:''}

    <!-- ── HEADER CARD ── -->
    <div class="card" style="background:linear-gradient(135deg,rgba(13,216,128,.12),rgba(72,187,120,.07));border:1px solid rgba(13,216,128,.25);margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div>
          <div style="font-size:16px;font-weight:800">תזרים ${scopeLabel}</div>
          <div style="font-size:12px;color:#7b82a8">${MONTHS[curM]} ${curY}</div>
        </div>
        <div style="font-size:11px;color:#7b82a8;background:#17171B;border-radius:8px;padding:6px 10px">
          פתיחה: <strong style="color:#e8eaf0">${fmt(openingBal)}</strong>
        </div>
      </div>

      <!-- 3 KPIs -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
        <div style="background:#17171B;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#7b82a8;margin-bottom:2px">↑ צפוי להיכנס</div>
          <div style="font-weight:800;font-size:14px;color:#68d391">+${fmt(cur.income)}</div>
        </div>
        <div style="background:#17171B;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#7b82a8;margin-bottom:2px">↓ צפוי לרדת</div>
          <div style="font-weight:800;font-size:14px;color:#f87171">-${fmt(cur.totalOut)}</div>
        </div>
        <div style="background:#17171B;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#7b82a8;margin-bottom:2px">= יתרה צפויה</div>
          <div style="font-weight:800;font-size:${Math.abs(cur.balance)>99999?'12':'14'}px;color:${balColor(cur.balance)}">${cur.balance>=0?'+':''}${fmt(cur.balance)}</div>
        </div>
      </div>

      <!-- Mini bar chart -->
      <div style="display:flex;align-items:flex-end;height:${CHART_H}px;gap:3px;background:#17171B;border-radius:10px;padding:8px 6px 4px">
        ${rows.map(r=>{
          const pct = Math.max(4, Math.abs(r.balance)/maxAbs*100);
          const col = r.isCurrent ? '#0DD880' : (r.balance>=0?'#48bb78':'#f87171');
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
            <div style="width:100%;background:${col};border-radius:3px 3px 0 0;height:${pct}%;opacity:${r.isPast?0.4:1}"></div>
            <div style="font-size:9px;color:#7b82a8;white-space:nowrap">${MONTHS[r.m].slice(0,3)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- ── CREDIT CARD ALERTS ── -->
    ${cur.cardCharges.length>0?`
    <div class="card" style="border:1px solid rgba(246,173,85,.3);background:rgba(246,173,85,.04);margin-bottom:12px">
      <div class="section-title" style="color:#f6ad55">💳 חיובי כרטיסי אשראי — ${MONTHS[curM]}</div>
      <div style="font-size:11px;color:#7b82a8;margin-bottom:10px">הוצאות שנרכשו בחודש הקודם וצפויות לחייב החשבון</div>
      ${cur.cardCharges.map(({card,total,items})=>`
        <div style="padding:8px 0;border-bottom:1px solid #252836">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="font-weight:700;font-size:13px">💳 ${card.name}</div>
              <div style="font-size:11px;color:#7b82a8">מועד חיוב: ${card.billingDay} לחודש</div>
            </div>
            <div style="font-weight:800;font-size:14px;color:#f6ad55">${fmt(total)}</div>
          </div>
          ${items&&items.length?`<div style="font-size:11px;color:#7b82a8;margin-top:4px;padding-right:4px">${items.slice(0,3).join(' · ')}${items.length>3?` ועוד ${items.length-3}...`:''}</div>`:''}
        </div>`).join('')}
      <div style="display:flex;justify-content:space-between;font-weight:800;padding-top:8px">
        <span>סה"כ חיובים החודש</span>
        <span style="color:#f6ad55">${fmt(cur.cardTotal)}</span>

    <!-- ── BREAKDOWN ── -->
    <div class="card" style="margin-bottom:12px">
      <div class="section-title">📋 פירוט ${MONTHS[curM]}</div>

function exportBackup(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const d=new Date();
  const a=document.createElement('a');a.href=url;a.download=`budget-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;a.click();
  URL.revokeObjectURL(url);showToast('✅ גיבוי הורד');
}

function importBackup(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=async e=>{
    try{
      const p=JSON.parse(e.target.result);
      if(!p.fixed||!p.variable||!p.incomes)throw new Error();
      db=p;ensureStructure();await saveDB();render();showToast('✅ נתונים שוחזרו');
    }catch{showToast('❌ קובץ לא תקין');}
  };r.readAsText(file);
}

// ── Excel Import ──────────────────────────────────────────
function parseExcelFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const json=XLSX.utils.sheet_to_json(ws,{defval:''});
        const rows=[];
        const nameKeys=['שם הוצאה','שם','name','הוצאה','פריט','תיאור','שם ההוצאה','שם הכנסה','מקור','description','item'];
        const amountKeys=['סכום','עלות','amount','מחיר','price','סה"כ','סה״כ','total','כמות'];
        json.forEach(row=>{
          const keys=Object.keys(row).map(k=>k.trim().toLowerCase());
          const origKeys=Object.keys(row);
          let name='',amount=0;
          for(const k of nameKeys){const idx=origKeys.findIndex(ok=>ok.trim().toLowerCase()===k.toLowerCase());if(idx>=0){name=String(row[origKeys[idx]]).trim();break;}}
          for(const k of amountKeys){const idx=origKeys.findIndex(ok=>ok.trim().toLowerCase()===k.toLowerCase());if(idx>=0){amount=parseFloat(String(row[origKeys[idx]]).replace(/[^\d.]/g,''))||0;break;}}
          // fallback: first col = name, second col = amount
          if(!name&&origKeys[0])name=String(row[origKeys[0]]).trim();
          if(!amount&&origKeys[1])amount=parseFloat(String(row[origKeys[1]]).replace(/[^\d.]/g,''))||0;
          if(name&&name.length>0)rows.push({name,amount});
        });
        resolve(rows);
      }catch(err){reject(err);}
    };
    reader.onerror=reject;
    reader.readAsArrayBuffer(file);
  });
}

function downloadTemplate(){

  ]);

}

function attach(){
  // data-tab, data-month, data-rmode etc handled in delegation below
  // ySel handled below via change delegation
  const expBtn=g('exportBtn');if(expBtn)expBtn.addEventListener('click',exportBackup);
  const impBtn=g('importBtn');if(impBtn)impBtn.addEventListener('click',()=>g('importFile')?.click());
  const impFile=g('importFile');if(impFile)impFile.addEventListener('change',e=>importBackup(e.target.files[0]));
  const emlBtn=g('emailBtn');if(emlBtn)emlBtn.addEventListener('click',sendEmailReport);

  // userBadge and signOut handled in delegation

  // Close user menu on outside click
  if(S.showUserMenu){
    setTimeout(()=>{
      document.addEventListener('click', function handler(e){
        const menu=g('userMenu'),badge=g('userBadgeBtn');
        if(menu&&!menu.contains(e.target)&&e.target!==badge){S.showUserMenu=false;render();}
        document.removeEventListener('click',handler);
      });
    },50);
  }

  // budget/currency/goal change listeners handled in change delegation above

  // Excel import
  const excelFileInput=g('excelFileInput');
  if(excelFileInput){
    excelFileInput.addEventListener('change',async e=>{
      const file=e.target.files[0];if(!file)return;
      try{
        showToast('⏳ קורא קובץ…');
        const rows=await parseExcelFile(file);
        if(!rows.length){showToast('❌ לא נמצאו שורות בקובץ');return;}
        S.excelRows=rows;
        S.excelChecked={};
        render();
        showToast(`✅ נמצאו ${rows.length} שורות`);
      }catch(err){showToast('❌ שגיאה בקריאת הקובץ');}
    });
  }
  const dlTpl=g('downloadTemplateBtn');
  if(dlTpl)dlTpl.addEventListener('click',downloadTemplate);

  // Excel category selects per row
  document.querySelectorAll('.excel-cat-sel').forEach(sel=>{
    sel.addEventListener('change',()=>{
      if(!S.excelRowCats)S.excelRowCats={};
      S.excelRowCats[parseInt(sel.dataset.idx)]=sel.value;
    });
  });

  // "Set category for all" shortcut
  const setCatAllBtn=g('setCatAllBtn');
  if(setCatAllBtn){
    setCatAllBtn.addEventListener('click',()=>{
      const isIncome=S.activeType==='income';
      const isFixed=S.activeType.endsWith('-fixed');
      const baseType=isFixed?S.activeType.replace('-fixed',''):S.activeType;
      const catList=isIncome?(db.settings.incomeTypes||[]):(db.settings.cats[baseType]||[]);
      const chosen=catList.length>0?catList[0]:'אחר';

function llGetMonthlyIncome() {
  if(!db) return 20000;
  const m = S.month, y = S.year;
  const inc = totalInc(m,y);
  if(inc > 0) return inc;
  // Fallback: average last 3 months
  let total = 0, count = 0;
  for(let i=1;i<=3;i++){
    let mm=m-i, yy=y; if(mm<0){mm+=12;yy--;}
    const v = totalInc(mm,yy);
    if(v>0){total+=v;count++;}
  }
  return count>0 ? total/count : 20000;
}

function llGetMonthlyExpenses() {
  if(!db) return 12000;
  const m = S.month, y = S.year;
  const exp = totalExp(m,y);
  if(exp > 0) return exp;
  let total = 0, count = 0;
  for(let i=1;i<=3;i++){
    let mm=m-i, yy=y; if(mm<0){mm+=12;yy--;}
    const v = totalExp(mm,yy);
    if(v>0){total+=v;count++;}
  }
  return count>0 ? total/count : 12000;
}

function llGetNetWorth() {
  if(!db) return 0;
  const savings = (db.savings||[]).reduce((s,sv)=>s+(sv.current||0),0);
  return savings;
}

function llGetFreeCashFlow() {
  return llGetMonthlyIncome() - llGetMonthlyExpenses();
}

function llFmt(n) {
  const sym = db ? getCurrencySymbol() : '₪';
  return sym + Math.round(Math.abs(n)).toLocaleString('he-IL');
}

function llFmtSigned(n) {
  return (n >= 0 ? '+' : '−') + llFmt(n);
}

// Normal distribution random
function randNormal(mean, std) {
  let u = 0, v = 0;
  while(u === 0) u = Math.random();
  while(v === 0) v = Math.random();
  return mean + std * Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

function runMonteCarlo(scenarioParams, months, simulations = 2000) {
  const baseIncome = llGetMonthlyIncome();
  const baseExpenses = llGetMonthlyExpenses();
  const openingBalance = llGetNetWorth();

  const {
    incomeShock = 0,
    expenseShock = 0,
    oneTimeCost = 0,
    incomeGrowth = 0,
    shockDuration = Infinity,
  } = scenarioParams;

  // Income/expense volatility (historical std)
  const incomeStd = baseIncome * 0.08;   // 8% volatility
  const expenseStd = baseExpenses * 0.10; // 10% volatility

  const allPaths = [];

  for(let sim = 0; sim < simulations; sim++) {
    let balance = openingBalance - (oneTimeCost > 0 ? oneTimeCost : 0);
    const path = [balance];

    for(let month = 1; month <= months; month++) {
      // Apply income shock (tapers off for freelance-style shocks after shockDuration)
      const shockFactor = month <= shockDuration ? (1 + incomeShock) : (1 + incomeShock * Math.exp(-(month - shockDuration) * 0.3));
      const growthFactor = Math.pow(1 + incomeGrowth, month);

      const income = Math.max(0, randNormal(baseIncome * shockFactor * growthFactor, incomeStd));
      const expenses = Math.max(0, randNormal(baseExpenses + expenseShock, expenseStd));

      // One-time income (negative oneTimeCost = bonus)
      const bonus = (oneTimeCost < 0 && month === 1) ? Math.abs(oneTimeCost) : 0;

      balance += income - expenses + bonus;
      path.push(Math.round(balance));
    }
    allPaths.push(path);
  }

  // Compute percentiles at each month
  const percentiles = [];
  for(let month = 0; month <= months; month++) {
    const vals = allPaths.map(p => p[month]).sort((a,b) => a-b);
    const p10  = vals[Math.floor(simulations * 0.10)];
    const p25  = vals[Math.floor(simulations * 0.25)];
    const p50  = vals[Math.floor(simulations * 0.50)];
    const p75  = vals[Math.floor(simulations * 0.75)];
    const p90  = vals[Math.floor(simulations * 0.90)];
    percentiles.push({ month, p10, p25, p50, p75, p90 });
  }

  // Liquidity Confidence Score: % of paths that stay positive throughout
  const liquidityScore = Math.round(
    (allPaths.filter(p => p.every(v => v > 0)).length / simulations) * 100
  );

  // Survival rate at each horizon
  const survival = {};
  [6, 12, 18, 24, 36].filter(h => h <= months).forEach(h => {
    survival[h] = Math.round((allPaths.filter(p => p[h] > 0).length / simulations) * 100);
  });

  return { percentiles, liquidityScore, survival, simulations, months, openingBalance };
}

function buildMCResults(results) {
  const { percentiles, liquidityScore, survival, months } = results;
  const scoreColor = liquidityScore >= 80 ? '#0DD880' : liquidityScore >= 60 ? '#f6ad55' : '#f87171';
  const scoreLabel = liquidityScore >= 80 ? 'גבוה' : liquidityScore >= 60 ? 'בינוני' : 'נמוך';
  const last = percentiles[percentiles.length - 1];

  // SVG chart
  const chartW = 340, chartH = 140;
  const allVals = percentiles.flatMap(p => [p.p10, p.p90]);
  const minV = Math.min(...allVals);
  const maxV = Math.max(...allVals);
  const scaleX = i => Math.round((i / months) * chartW);
  const scaleY = v => Math.round(chartH - ((v - minV) / (maxV - minV + 1)) * chartH);

  const band90 = percentiles.map((p,i) => `${scaleX(i)},${scaleY(p.p90)}`).join(' ');
  const band10Rev = [...percentiles].reverse().map((p,i) => `${scaleX(months-i)},${scaleY(p.p10)}`).join(' ');
  const band75 = percentiles.map((p,i) => `${scaleX(i)},${scaleY(p.p75)}`).join(' ');
  const band25Rev = [...percentiles].reverse().map((p,i) => `${scaleX(months-i)},${scaleY(p.p25)}`).join(' ');
  const median = percentiles.map((p,i) => `${scaleX(i)},${scaleY(p.p50)}`).join(' ');
  const zeroY = scaleY(0);

  return `
  <!-- Confidence Score -->
  <div class="card" style="margin-bottom:14px;text-align:center;padding:22px">
    <div style="font-size:12px;color:#7b82a8;margin-bottom:10px;font-weight:600">ציון ביטחון תזרימי (Liquidity Confidence)</div>
    <div style="font-size:56px;font-weight:900;color:${scoreColor};letter-spacing:-2px;line-height:1">${liquidityScore}%</div>
    <div style="font-size:13px;color:${scoreColor};margin-top:4px;font-weight:600">${scoreLabel}</div>
    <div style="font-size:11px;color:#7b82a8;margin-top:6px">אחוז הסימולציות שנשארו עם יתרה חיובית לאורך כל התקופה</div>

    <div style="display:flex;justify-content:center;gap:14px;margin-top:16px;flex-wrap:wrap">
      ${Object.entries(survival).map(([h,pct]) => `
        <div style="text-align:center">
          <div style="font-size:18px;font-weight:800;color:${pct>=75?'#0DD880':pct>=50?'#f6ad55':'#f87171'}">${pct}%</div>
          <div style="font-size:10px;color:#7b82a8">${h} חודשים</div>
        </div>`).join('')}
    </div>
  </div>

  <!-- Chart -->
  <div class="card" style="margin-bottom:14px">
    <div class="section-title"> פיזור תחזיות — ${months} חודשים</div>
    <div style="overflow-x:auto">
      <svg viewBox="0 0 ${chartW} ${chartH}" width="100%" style="display:block;max-height:160px">
        <defs>
          <linearGradient id="greenGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#0DD880" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#0DD880" stop-opacity="0.03"/>
          </linearGradient>
        </defs>
        <!-- Zero line -->
        ${zeroY > 0 && zeroY < chartH ? `<line x1="0" y1="${zeroY}" x2="${chartW}" y2="${zeroY}" stroke="#f87171" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>` : ''}
        <!-- P10-P90 band -->
        <polygon points="${band90} ${band10Rev}" fill="#0DD880" opacity="0.08"/>
        <!-- P25-P75 band -->
        <polygon points="${band75} ${band25Rev}" fill="url(#greenGrad)"/>
        <!-- Median -->
        <polyline points="${median}" fill="none" stroke="#0DD880" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:#7b82a8;justify-content:center">
      <span>🟢 חציון (P50)</span>
      <span style="opacity:.7">▓ P25–P75</span>
      <span style="opacity:.4">░ P10–P90</span>
    </div>
  </div>

  <!-- Projection table -->
  <div class="card" style="margin-bottom:14px">
    <div class="section-title">📋 תחזית יתרה לפי אחוזונים</div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr>
          <th>חודש</th>
          <th>P10 (גרוע)</th>
          <th>P50 (ממוצע)</th>
          <th>P90 (טוב)</th>
        </tr></thead>
        <tbody>
          ${[3,6,9,12,18,24,36].filter(h=>h<=months).map(h => {
            const p = percentiles[h];
            return `<tr>
              <td style="color:#7b82a8">+${h} חודשים</td>

            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>
  `;
}

const CALENDAR_EVENTS = [
  { month: 0,  label: 'ינואר',    events: ['ביטוח רכב (סוף שנה)', 'תשלום רבעוני ביטוח לאומי'] },

  { month: 9,  label: 'אוקטובר',  events: ['סוכות — הוצאות מוגברות', 'תשלום ביטוח בריאות שנתי'] },
  { month: 11, label: 'דצמבר',    events: ['חנוכה', 'טסט רכב', 'סיכום שנתי מס'] },
];

const SEASONAL_SPIKES = {
  0: 1.15, 3: 1.20, 5: 1.10, 8: 1.35, 9: 1.30, 11: 1.25
};

function runLiquidityAgent() {
  if(!db) return [];
  const pits = [];
  const fcf = llGetFreeCashFlow();
  const baseExpenses = llGetMonthlyExpenses();
  const now = new Date();
  const curM = now.getMonth(), curY = now.getFullYear();

  for(let i = 0; i <= 11; i++) {
    let m = (curM + i) % 12;
    let y = curY + Math.floor((curM + i) / 12);
    const label = MONTHS[m] + ' ' + y;

    const spike = SEASONAL_SPIKES[m] || 1.0;
    const projExpenses = baseExpenses * spike;
    const projIncome = llGetMonthlyIncome();
    const projFCF = projIncome - projExpenses;

    const calEvents = CALENDAR_EVENTS.find(e => e.month === m);
    const extraEvents = calEvents ? calEvents.events : [];

    if(projFCF < 0 || spike > 1.1) {
      const severity = projFCF < -5000 ? 'high' : projFCF < 0 ? 'medium' : 'low';
      const shortfall = Math.max(0, projExpenses - projIncome);
      pits.push({
        month: m, year: y, label,
        projIncome, projExpenses, projFCF,
        severity, spike, shortfall,
        events: extraEvents,
        recommendation: llGenerateRecommendation(m, shortfall, projFCF, spike),
      });
    }
  }

  LL.agent.pits = pits;
  LL.agent.lastRun = new Date().toLocaleTimeString('he-IL');
  return pits;
}

function llGenerateRecommendation(month, shortfall, fcf, spike) {
  const sym = db ? getCurrencySymbol() : '₪';
  const transferAmt = Math.ceil(shortfall / 1000) * 1000 + 2000;
  const startDay = (db&&db.settings&&db.settings.budget&&db.settings.budget.startDay) || 1;
  const recs = [];

  if(shortfall > 0) {
    recs.push(`💸 העבר ${sym}${transferAmt.toLocaleString('he-IL')} לחשבון עו"ש עד ה-${startDay} ל${MONTHS[(month-1+12)%12]}`);
  }
  if(spike >= 1.3) {
    recs.push(`🗓 ${MONTHS[month]} — חודש עם הוצאות עונתיות גבוהות. שקול קיצוץ ברצוניות.`);
  }
  if(fcf > -2000 && fcf < 2000) {
    recs.push(`⚡ תזרים קרוב לאפס — הגדל חיסכון אוטומטי חודש קודם`);
  }
  if([0,5].includes(month)) {
    recs.push(`📋 חודש זה כולל תשלומי מס — ודא שיש כיסוי בחשבון`);
  }

  return recs.length ? recs : [`✅ חודש ${MONTHS[month]} נראה תקין, אין פעולה נדרשת`];
}

async function llSendCFOMessage(text) {
  if(!text.trim() || LL.cfo.loading) return;

  LL.cfo.messages.push({ role: 'user', text });
  LL.cfo.loading = true;
  render();

  const context = llBuildContext();
  const systemPrompt = `אתה CFO אישי — יועץ פיננסי אסטרטגי מומחה. 
יש לך גישה מלאה לנתונים הפיננסיים של המשתמש.
ענה תמיד בעברית, בתמציתיות ובאופן מעשי.
השתמש במספרים קונקרטיים מהנתונים. 
אל תציג הסתייגויות משפטיות — תן ייעוץ ישיר ומבוסס נתונים.
כשרלוונטי, השתמש בחישובי ריבית דריבית (CAGR 7% לשוק ההון).
בסוף כל תשובה — הוסף "פעולה מומלצת:" עם צעד אחד קונקרטי.`;

  const messages = [
    ...LL.cfo.messages.slice(-6).filter(m => m.role !== 'system').map(m => ({
      role: m.role === 'ai' ? 'assistant' : 'user',
      content: m.text
    }))
  ];

  // Prepend context to first user message
  if(messages.length > 0 && messages[messages.length-1].role === 'user') {
    messages[messages.length-1].content = `${context}\n\n---\nשאלת המשתמש: ${messages[messages.length-1].content}`;
  }

  try {
    const response = await fetch('/.netlify/functions/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages,
      })
    });
    const data = await response.json();
    const reply = data.content?.[0]?.text || 'שגיאה — נסה שוב';
    LL.cfo.messages.push({ role: 'ai', text: reply });
  } catch(e) {
    LL.cfo.messages.push({ role: 'ai', text: '❌ שגיאה בתקשורת עם השרת. נסה שוב.' });
  }

  LL.cfo.loading = false;
  render();
  setTimeout(() => {
    const el = document.getElementById('cfoMessages');
    if(el) el.scrollTop = el.scrollHeight;
  }, 50);
}

// Financial Independence target
function llCalcFreedomData() {
  const monthlyExpenses = llGetMonthlyExpenses();
  const yearlyExpenses = monthlyExpenses * 12;

  // Safe Withdrawal Rate: 4% rule
  const targetNetWorth = yearlyExpenses * 25;

  const currentNetWorth = llGetNetWorth();
  const monthlyFCF = llGetFreeCashFlow();
  const yearlyFCF = Math.max(0, monthlyFCF * 12);

  // With compound returns (7% annually on investments)
  const annualReturn = 0.07;
  let balance = currentNetWorth;
  let monthsToFreedom = 0;

  if(yearlyFCF > 0 || currentNetWorth > 0) {
    const MAX_MONTHS = 600; // 50 years cap
    while(balance < targetNetWorth && monthsToFreedom < MAX_MONTHS) {
      balance = balance * (1 + annualReturn/12) + monthlyFCF;
      monthsToFreedom++;
    }
  }

  const yearsToFreedom = monthsToFreedom / 12;
  const freedomYear = new Date().getFullYear() + Math.floor(yearsToFreedom);
  const pct = Math.min(100, Math.round((currentNetWorth / targetNetWorth) * 100));

  return {
    monthlyExpenses, yearlyExpenses, targetNetWorth,
    currentNetWorth, monthlyFCF, yearlyFCF,
    monthsToFreedom, yearsToFreedom, freedomYear, pct,
  };
}

// Convert a transaction to time (weeks/days toward freedom)
function llExpenseToTime(amount, fd) {
  if(!fd || fd.monthlyFCF <= 0 || !amount) return null;
  const daysPerMonth = 30;
  const fcfPerDay = fd.monthlyFCF / daysPerMonth;
  if(fcfPerDay <= 0) return null;
  const days = amount / fcfPerDay;
  if(days >= 30) return Math.round(days / 30) + ' חודשים';
  if(days >= 7)  return Math.round(days / 7) + ' שבועות';
  return Math.round(days) + ' ימים';
}

window.calc300 = function() {
  const val = parseFloat(document.getElementById('fc_monthly_expense')?.value)||0;
  const res = document.getElementById('fc_300_result');
  if(!res) return;
  const sym = typeof getCurrencySymbol==='function' ? getCurrencySymbol() : '₪';
  res.textContent = val > 0 ? sym + (val*300).toLocaleString('he-IL') : '—';
};

window.updateFreedomCalc = function() {
  const g = id => parseFloat(document.getElementById(id)?.value)||0;
  const initial    = g('fc_initial');
  const monthly    = g('fc_monthly');
  const annualRate = g('fc_rate') / 100;
  const years      = g('fc_years');
  const feeDeposit = g('fc_fee_deposit') / 100;
  const feeAccum   = g('fc_fee_accum') / 100;
  const sym        = (document.getElementById('fc_currency')?.selectedOptions[0]?.textContent||'').match(/[₪$€£]/)?.[0] || '₪';

  if(years <= 0 || annualRate < 0) return;

  const months = years * 12;
  const monthlyRate = Math.pow(1 + annualRate, 1/12) - 1;

  // Gross calculations (no fees)
  let grossBalance  = initial;
  let totalDeposits = initial;
  for(let i = 0; i < months; i++) {
    grossBalance = grossBalance * (1 + monthlyRate) + monthly;
    totalDeposits += monthly;
  }
  const grossProfit = grossBalance - totalDeposits;

  // With fees
  const monthlyFeeAccum   = Math.pow(1 + feeAccum, 1/12) - 1;
  const monthlyDepositFee = monthly * feeDeposit;
  const effectiveMonthly  = monthly - monthlyDepositFee;

  let netBalance = initial;
  let totalDepositFees = 0;
  for(let i = 0; i < months; i++) {
    netBalance = netBalance * (1 + monthlyRate - monthlyFeeAccum) + effectiveMonthly;
    totalDepositFees += monthlyDepositFee;
  }
  const totalAccumFees = grossBalance - netBalance - totalDepositFees;
  const fmt = n => sym + Math.round(Math.max(0,n)).toLocaleString('he-IL');

  const rows = [
    {label:'סכום הפקדה כולל',          val:fmt(totalDeposits),    color:'#e8eaf0'},
    {label:'רווח (ריבית דריבית)',        val:fmt(grossProfit),       color:'#0DD880'},
    {label:'דמי ניהול מהפקדה',          val:fmt(totalDepositFees),  color:'#f87171'},
    {label:'דמי ניהול מצבירה',          val:fmt(Math.max(0,totalAccumFees)), color:'#f87171'},
    null,
    {label:'סכום עתידי ללא דמי ניהול', val:fmt(grossBalance),      color:'#0DD880', big:true},
    {label:'סכום עתידי בניכוי דמי ניהול', val:fmt(netBalance),     color:'#f6ad55', big:true},
  ];

  const rule300Gross = Math.round(grossBalance / 300);
  const rule300Net   = Math.round(netBalance / 300);

  const el = document.getElementById('fc_output');
  if(!el) return;
  el.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:0">
      ${rows.map(r => r === null
        ? '<div style="height:1px;background:rgba(255,255,255,.06);margin:12px 0"></div>'
        : `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
            <span style="font-size:${r.big?'14':'13'}px;font-weight:${r.big?700:400};color:${r.big?'#e8eaf0':'#9ca3af'}">${r.label}</span>
            <span style="font-size:${r.big?'18':'14'}px;font-weight:${r.big?800:600};color:${r.color}">${r.val}</span>
          </div>`).join('')}
    </div>
    <div style="margin-top:16px;padding:14px;background:rgba(13,216,128,.06);border-radius:10px;border:1px solid rgba(13,216,128,.15)">
      <div style="font-size:11px;color:#7b82a8;margin-bottom:8px;font-weight:600">לפי חוק ה-300 — הקצבה החודשית האפשרית:</div>
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div style="text-align:center">
          <div style="font-size:11px;color:#7b82a8;margin-bottom:3px">ללא דמי ניהול</div>
          <div style="font-size:20px;font-weight:800;color:#0DD880">${sym}${rule300Gross.toLocaleString('he-IL')}/חודש</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:11px;color:#7b82a8;margin-bottom:3px">בניכוי דמי ניהול</div>
          <div style="font-size:20px;font-weight:800;color:#f6ad55">${sym}${rule300Net.toLocaleString('he-IL')}/חודש</div>
        </div>
      </div>
    </div>`;
};

// ── Data helpers ──────────────────────────────────────────────
function avGetBaseBudget(scope, month, year) {
  if(!db) return { incomePlanned: 20000, expensesPlanned: 12000 };
  const scopeType = scope === 'family' ? 'family' : 'personal';
  const incomePlanned  = totalInc(month, year);
  const fixedExp = fixedTotal(scopeType);
  const varExp   = varTotal(scopeType, month, year);
  const expensesPlanned = fixedExp + varExp;
  return {
    incomePlanned:  incomePlanned  || (scope==='family' ? 8000 : 12000),
    expensesPlanned: expensesPlanned || (scope==='family' ? 6500 : 8000),
  };
}

function avGetEventsForMonth(month) {
  return AV.events.filter(e => e.month === month && !e._deleted);
}

function avGetEventsCost(month) {
  return avGetEventsForMonth(month).reduce((s,e) => s + (parseFloat(e.estimatedCost)||0), 0);
}

function avCalcMonthData(month) {
  const base = avGetBaseBudget(AV.scope, month, AV.year);
  const eventsCost = avGetEventsCost(month);
  const netBase    = base.incomePlanned - base.expensesPlanned;
  const netAfter   = netBase - eventsCost;
  const status     = netAfter > 500 ? 'green' : netAfter > -500 ? 'yellow' : 'red';
  return { ...base, eventsCost, netBase, netAfter, status, month };
}

function avCalcYearlySummary() {
  let totalIncome=0, totalExpenses=0, totalEvents=0;
  for(let m=0;m<12;m++){
    const d = avCalcMonthData(m);
    totalIncome   += d.incomePlanned;
    totalExpenses += d.expensesPlanned;
    totalEvents   += d.eventsCost;
  }
  return { totalIncome, totalExpenses, totalEvents, netYearly: totalIncome - totalExpenses - totalEvents };
}

function avGenSavingSuggestions() {
  const suggestions = [];
  const now = new Date();
  const curMonth = now.getMonth();
  AV.events.filter(e=>!e._deleted && (parseFloat(e.estimatedCost)||0)>0).forEach(ev => {
    const targetMonth = ev.month;
    const cost = parseFloat(ev.estimatedCost)||0;
    let availableMonths = targetMonth - curMonth;
    if(availableMonths <= 0) availableMonths = 12 + availableMonths;
    if(availableMonths <= 0) availableMonths = 1;
    const monthly = Math.ceil(cost / availableMonths);
    const cat = AV_CATS[ev.category]||AV_CATS.OTHER;
    suggestions.push({
      id: ev.id,
      relatedEventId: ev.id,
      eventTitle: ev.title,
      month: targetMonth,
      totalSavingNeeded: cost,
      monthlySavingAmount: monthly,
      availableMonths,
      message: `כדי לממן את "${ev.title}" בעלות ${llFmt(cost)}, מומלץ לחסוך ${llFmt(monthly)} לחודש בין ${MONTHS[curMonth]} ל${MONTHS[targetMonth]} (${availableMonths} חודשים).`,
      icon: cat.icon,
    });
  });
  return suggestions;
}

// ── SVG Bar Chart ─────────────────────────────────────────────
function avBuildChart() {
  const W=340, H=110, pad=24;
  const monthData = MONTHS.map((_,m) => avCalcMonthData(m));
  const maxVal = Math.max(...monthData.flatMap(d=>[d.incomePlanned, d.expensesPlanned+d.eventsCost]), 1);
  const barW = Math.floor((W - pad*2) / 12) - 2;

  const bars = monthData.map((d,i) => {
    const x = pad + i * ((W-pad*2)/12);
    const incH  = Math.round((d.incomePlanned / maxVal) * (H-10));
    const expH  = Math.round(((d.expensesPlanned+d.eventsCost) / maxVal) * (H-10));
    const col   = d.status==='green'?'#0DD880':d.status==='yellow'?'#f6ad55':'#f87171';
    return `
      <rect x="${x}" y="${H-incH}" width="${Math.floor(barW/2)-1}" height="${incH}" fill="#0DD88055" rx="2"/>
      <rect x="${x+Math.floor(barW/2)}" y="${H-expH}" width="${Math.ceil(barW/2)-1}" height="${expH}" fill="${col}88" rx="2"/>`;
  }).join('');

  const labels = MONTHS.map((_,i) => {
    const x = pad + i*((W-pad*2)/12) + barW/2;
    return `<text x="${x}" y="${H+14}" text-anchor="middle" font-size="8" fill="#7b82a8">${MONTHS[i].slice(0,3)}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H+18}" width="100%" style="display:block">
    ${bars}${labels}
    <line x1="${pad}" y1="${H}" x2="${W-pad}" y2="${H}" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  </svg>`;
}

function getUpcomingHolidays(monthsAhead = 3) {
  const isHebrew = (_lang === 'he' || _lang === 'ar');
  const holidays = isHebrew ? JEWISH_HOLIDAYS : CHRISTIAN_HOLIDAYS;
  const now = new Date();
  const curM = now.getMonth();
  const results = [];
  for(let i = 0; i <= monthsAhead; i++) {
    const m = (curM + i) % 12;
    holidays.filter(h => h.month === m).forEach(h => {
      const daysUntil = i === 0
        ? Math.max(0, h.day - now.getDate())
        : (i * 30 - now.getDate() + h.day);
      results.push({ ...h, daysUntil, targetMonth: m });
    });
  }
  return results.filter(h => h.daysUntil >= 0).sort((a,b) => a.daysUntil - b.daysUntil);
}

      <input id="avTitle" value="${f.title||''}" placeholder="שם האירוע (למשל: חופשת פסח)"
        style="background:#17171B;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e8eaf0;font-size:14px;padding:10px 12px;font-family:Heebo,sans-serif;outline:none;width:100%"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">

            ${MONTHS.map((m,i)=>`<option value="${i}" ${f.month===i?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
        <div>
          <div style="font-size:11px;color:#7b82a8;margin-bottom:5px">עלות משוערת (${sym})</div>
          <input id="avCost" type="number" value="${f.estimatedCost||''}" placeholder="0"
            style="width:100%;background:#17171B;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e8eaf0;font-size:14px;padding:9px 12px;font-family:Heebo,sans-serif;outline:none;direction:ltr"/>
        </div>
      </div>
      <div>
        <div style="font-size:11px;color:#7b82a8;margin-bottom:5px">קטגוריה</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${Object.entries(AV_CATS).map(([id,cat])=>`
            <button onclick="AV.formData.category='${id}';document.querySelectorAll('.av-cat-btn').forEach(b=>b.style.background='transparent');this.style.background='rgba(13,216,128,.15)'"
              class="av-cat-btn" style="padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:${f.category===id?'rgba(13,216,128,.15)':'transparent'};color:${f.category===id?'#0DD880':'#7b82a8'};font-size:12px;cursor:pointer;font-family:Heebo,sans-serif">${cat.icon} ${cat.label}</button>`).join('')}
        </div>
      </div>
      <input id="avDesc" value="${f.description||''}" placeholder="תיאור קצר (אופציונלי)"
        style="background:#17171B;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e8eaf0;font-size:13px;padding:9px 12px;font-family:Heebo,sans-serif;outline:none;width:100%"/>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button onclick="AV.showEventForm=false;AV.editEvent=null;render()"
          style="padding:9px 16px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#7b82a8;font-size:13px;cursor:pointer;font-family:Heebo,sans-serif">ביטול</button>
        <button onclick="avSaveEvent()"
          style="padding:9px 18px;background:#0DD880;border:none;border-radius:8px;color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif">${isEdit ? 'עדכן' : 'הוסף אירוע'}</button>
      </div>
    </div>
  </div>`;
}

window.avSaveEvent = async function() {
  const title = document.getElementById('avTitle')?.value?.trim();
  const month = parseInt(document.getElementById('avMonth')?.value ?? AV.formData.month);
  const cost  = parseFloat(document.getElementById('avCost')?.value)||0;
  const desc  = document.getElementById('avDesc')?.value?.trim()||'';
  if(!title){ showToast('❌ נא להזין שם לאירוע'); return; }
  const eventData = {
    id:           AV.editEvent || ('ev-'+Date.now()),
    title, month, estimatedCost: cost, description: desc,
    category:     AV.formData.category || 'OTHER',
    year:         AV.year,
    scope:        AV.scope,
  };
  if(AV.editEvent) {
    const idx = AV.events.findIndex(e=>e.id===AV.editEvent);
    if(idx>=0) AV.events[idx] = eventData;
  } else {
    AV.events.push(eventData);
  }
  AV.showEventForm = false;
  AV.editEvent = null;
  await avSaveEvents();
  render();
  showToast(AV.editEvent ? '✅ אירוע עודכן' : '✅ אירוע נוסף');
};

window.avEditEvent = function(id) {
  const ev = AV.events.find(e=>e.id===id);
  if(!ev) return;
  AV.editEvent = id;
  AV.formData = { title: ev.title, description: ev.description||'', month: ev.month, estimatedCost: ev.estimatedCost||'', category: ev.category||'OTHER' };
  AV.showEventForm = true;
  render();
};

window.avDeleteEvent = function(id) {
  const ev = AV.events.find(e=>e.id===id);
  if(!ev) return;
  showAdminConfirmDialog(`למחוק את האירוע "${ev.title}"?`, async()=>{
    AV.events = AV.events.filter(e=>e.id!==id);
    await avSaveEvents();
    render();
    showToast('🗑 אירוע נמחק');
  });
};

  messages: [],

  scope: 'all',  // personal | personal2 | family | all
};

function advBuildContext() {
  if(!db) return 'אין נתונים';
  const m = S.month, y = S.year;
  const sym = getCurrencySymbol();
  const p = db.settings?.profile || {};
  const name1 = p.name || 'משתמש ראשי';
  const name2 = p.partnerName || 'בן/בת זוג';

  const buildScopeCtx = (scope, label) => {
    const stype = scope === 'family' ? 'family' : 'personal';
    const inc  = scope === 'all'
      ? totalInc(m,y)
      : (db.incomes||[]).filter(e=>e.type===stype&&e.month===m&&e.year===y).reduce((s,e)=>s+toBase(e.amount||0,e.currency),0);
    const exp  = scope === 'all'
      ? totalExp(m,y)
      : fixedTotal(stype) + varTotal(stype,m,y);
    const fcf  = inc - exp;
    return `${label}: הכנסות ${sym}${Math.round(inc).toLocaleString('he-IL')}, הוצאות ${sym}${Math.round(exp).toLocaleString('he-IL')}, FCF ${sym}${Math.round(fcf).toLocaleString('he-IL')}`;
  };

  const lines = [
    `חודש: ${MONTHS[m]} ${y}`,
    `ציון בריאות: ${calcHealthScore(m,y)}/100`,
    `מטבע: ${getCurrency()}`,
  ];
  if(ADV.scope === 'all' || ADV.scope === 'personal')  lines.push(buildScopeCtx('personal',  name1));
  if(ADV.scope === 'all' || ADV.scope === 'personal2') lines.push(buildScopeCtx('personal2', name2));
  if(ADV.scope === 'all' || ADV.scope === 'family')    lines.push(buildScopeCtx('family',    'חשבון משפחתי'));
  const savings = (db.savings||[]).map(s=>`${s.name}: נצבר ${sym}${Math.round(calcSavingsTotal(s)).toLocaleString('he-IL')} מתוך ${sym}${(s.target||0).toLocaleString('he-IL')}`);
  if(savings.length) lines.push('חיסכון: '+savings.join(' | '));
  const budget = db.settings?.budget||{};
  if(budget.personal) lines.push(`תקציב אישי: ${sym}${budget.personal.toLocaleString('he-IL')}/חודש`);
  if(budget.family)   lines.push(`תקציב משפחה: ${sym}${budget.family.toLocaleString('he-IL')}/חודש`);

  return lines.join('\n');
}

async function advSend(text) {
  if(!text?.trim() || ADV.loading) return;
  ADV.messages.push({role:'user', text});
  ADV.loading = true;
  render();

  const ctx = advBuildContext();
  const scopeLabel = {all:'כולם', personal:'אישי', personal2:'בן/בת זוג', family:'משפחה'}[ADV.scope]||'כולם';
  const system = `אתה יועץ פיננסי אישי חכם ומנוסה. יש לך נתונים מלאים של המשתמש.
ענה תמיד בעברית, בצורה ישירה, מעשית ומבוססת נתונים.
לא תתן אזהרות משפטיות. תהיה ספציפי עם מספרים.
הצג תובנות פיננסיות לגבי: ${scopeLabel}.
בסוף כל תשובה הוסף "המלצה מיידית:" עם פעולה אחת קונקרטית.

נתוני המשתמש:\n${ctx}`;

  const msgs = ADV.messages.slice(-8).filter(m=>m.role!=='system').map(m=>({
    role: m.role==='ai'?'assistant':'user',
    content: m.text,
  }));

  try {
    const resp = await fetch('/.netlify/functions/claude', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 900,
        system,
        messages: msgs,
      })
    });
    const data = await resp.json();
    if(!resp.ok) throw new Error(data.error?.message || 'שגיאת שרת');
    const reply = data.content?.[0]?.text || 'לא הצלחתי לענות, נסה שוב';
    ADV.messages.push({role:'ai', text: reply});
  } catch(e) {
    ADV.messages.push({role:'ai', text:`שגיאה: ${e.message}. בדוק את חיבור הרשת ואת הגדרות השרת.`});
  }
  ADV.loading = false;
  render();
  setTimeout(()=>{ const el=document.getElementById('advMessages'); if(el) el.scrollTop=el.scrollHeight; }, 60);
}

function calcSavingsCurrent(s) {
  // Base: extra (opening balance) + monthly * months elapsed
  const now = new Date();
  const start = s.startDate ? new Date(s.startDate) : now;
  const monthsElapsed = s.endDate
    ? Math.max(0, Math.round((Math.min(now, new Date(s.endDate)) - start) / (1000*60*60*24*30)))
    : (s.months||0);
  const fromMonthly = (s.monthly||0) * monthsElapsed;
  // Plus manual deposits
  const fromDeposits = (s.deposits||[]).reduce((sum,d)=>sum+(d.amount||0),0);
  return (s.extra||0) + fromMonthly + fromDeposits;
}

function validateSavingsPlan(name, monthly, target, startDate, endDate, extra) {
  const warnings = [];
  if(!target || !endDate) return warnings;
  const start = new Date(startDate||new Date());
  const end   = new Date(endDate);
  const monthsAvail = Math.max(1, Math.round((end - start) / (1000*60*60*24*30)));
  const needed = target - (extra||0);
  const projectedTotal = (monthly||0) * monthsAvail;
  if(projectedTotal < needed) {
    const shortfall = needed - projectedTotal;
    const requiredMonthly = Math.ceil(needed / monthsAvail);
    warnings.push({
      type: 'shortfall',
      msg: `תוכנית לא תשיג את היעד — תצבור ${Math.round(projectedTotal).toLocaleString('he-IL')} ₪ מתוך ${target.toLocaleString('he-IL')} ₪ (חסר ${Math.round(shortfall).toLocaleString('he-IL')} ₪)`,
      tip: `על מנת להגיע ליעד, דרושה הפקדה חודשית של ${requiredMonthly.toLocaleString('he-IL')} ₪ (עוד ${Math.round(requiredMonthly - (monthly||0)).toLocaleString('he-IL')} ₪ נוספים)`,
      requiredMonthly,
    });
  }
  if(monthsAvail < 1) {
    warnings.push({type:'date', msg:'תאריך הסיום קודם לתאריך ההתחלה'});
  }
  if((monthly||0) <= 0 && !extra) {
    warnings.push({type:'amount', msg:'לא הוגדרה הפקדה חודשית או סכום פתיחה'});
  }
  return warnings;
}

  const family    = savings.filter(s=>s.stype==='family');

        </div>

      ${pct!==null?`
        <div style="background:#17171B;border-radius:6px;height:8px;overflow:hidden;margin-bottom:6px">

            <div style="font-size:12px;color:#f6ad55;font-weight:600;margin-bottom:3px">⚠ ${w.msg}</div>
            ${w.tip?`<div style="font-size:11px;color:#c8cce0">${w.tip}</div>`:''}
          `).join('')}
        </div>`:''}

      <div style="display:flex;gap:6px;flex-wrap:wrap">

          ${deposits.slice(-3).reverse().map(d=>`

              <span>${new Date(d.date).toLocaleDateString('he-IL')}</span>
            </div>`).join('')}
        </div>`:''}
    </div>`;
  };

  const renderSection = (list, label, stype) => `
    <div class="card" style="margin-bottom:14px;padding:0;overflow:visible">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.05)">

  ];

  return `<div>

          <div style="font-size:20px;font-weight:800;color:${s.color}">${sym}${Math.round(s.val).toLocaleString()}</div>
        </div>`).join('')}
    </div>

    ${renderSection(personal, hasPartner ? `חיסכון — ${name1}` : 'חיסכון אישי', 'personal')}
    ${hasPartner ? renderSection(personal2, `חיסכון — ${name2}`, 'personal2') : ''}
    ${isFamily   ? renderSection(family,   'חיסכון משפחתי', 'family') : ''}
  </div>`;
}

// ── Deposit action handler ────────────────────────────────────
// (injected into existing click handler via new action names)
window._handleDeposit = async function(action, b) {
  if(action==='open-deposit'){
    S.depositSavId = b.dataset.id;
    S.modal='deposit';
    render(); return true;
  }
  if(action==='save-deposit'){
    const amt = parseFloat(document.getElementById('depositAmt')?.value)||0;
    if(!amt||amt<=0){showToast('נא להזין סכום תקין');return true;}
    const note = document.getElementById('depositNote')?.value||'';
    const idx = (db.savings||[]).findIndex(s=>s.id===S.depositSavId);
    if(idx>=0){
      if(!db.savings[idx].deposits) db.savings[idx].deposits=[];
      db.savings[idx].deposits.push({amount:amt, note, date:new Date().toISOString().split('T')[0], id:'dep-'+Date.now()});
      await saveDB();
      S.modal=null; S.depositSavId=null;
      render(); showToast('✅ הפקדה נוספה בהצלחה');
    }
    return true;
  }
  return false;
};

        <button id="landingNewBtn"
          style="width:100%;padding:16px;background:#10B981;border:none;border-radius:12px;color:#000;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.2px;transition:opacity .15s"
          onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">
          ${L.newUser}
        </button>
        <button id="landingExistBtn"
          style="width:100%;padding:15px;background:transparent;border:1px solid rgba(148,163,184,.12);border-radius:12px;color:#475569;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s"
          onmouseover="this.style.borderColor='rgba(148,163,184,.25)';this.style.color='#94A3B8'" onmouseout="this.style.borderColor='rgba(148,163,184,.12)';this.style.color='#475569'">
          ${L.existingUser}
        </button>
      </div>

      <!-- Legal note -->
      <div style="margin-top:20px;font-size:10px;color:#1E293B;text-align:center;line-height:1.6">
        BETA · Free · No credit card required
      </div>
    </div>`;

  initLanding();
}

function renderPricingScreen() {
  const el = document.getElementById('pricingScreen');
  if(!el) return;
  const L = LANGS[_lang]||LANGS.he;
  el.dir = L.dir;
  el.style.background = '#09090B';
  el.style.fontFamily = "'Heebo',sans-serif";
  el.innerHTML = `
    <div style="min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;max-width:440px;margin:0 auto;box-sizing:border-box">
      <div style="width:100%;margin-bottom:18px">
        <button id="pricingBackBtn" style="background:none;border:none;color:#454860;font-size:14px;cursor:pointer;font-family:inherit;padding:0;display:flex;align-items:center;gap:4px">
          ${L.dir==='rtl'?'→':'←'} ${L.back}
        </button>
      </div>
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:24px;font-weight:900;color:#f0f2ff">${L.chooseplan}</div>
        <div style="font-size:13px;color:#454860;margin-top:6px">${L.betaFree}</div>
      </div>
      <div style="width:100%;background:#111113;border:1px solid rgba(13,216,128,.35);border-radius:18px;padding:24px;margin-bottom:12px;box-sizing:border-box">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
          <div>
            <div style="font-size:10px;color:#0DD880;font-weight:800;letter-spacing:2px;margin-bottom:5px">BETA</div>
            <div style="font-size:30px;font-weight:900;color:#fff">${L.freePlan}</div>
            <div style="font-size:12px;color:#454860;margin-top:3px">${L.noCreditCard}</div>
          </div>
          <div style="background:rgba(13,216,128,.15);border:1px solid rgba(13,216,128,.25);border-radius:8px;padding:5px 12px;font-size:11px;color:#0DD880;font-weight:700">${L.fullAccess}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:20px">
          ${PLAN_FEATURES_KEYS.map(f=>`<div style="font-size:12px;color:#8b8fa8;display:flex;align-items:center;gap:5px"><span style="color:#0DD880;font-size:13px">✓</span>${getLangText(f)}</div>`).join('')}
        </div>
        <button id="pricingStartBtn" style="width:100%;padding:15px;background:#0DD880;border:none;border-radius:12px;color:#000;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit">
          ${L.startFree}
        </button>
      </div>
      <div style="width:100%;background:#0e1120;border:1px solid #1a1d30;border-radius:14px;padding:16px;box-sizing:border-box;opacity:0.35;text-align:center">
        <div style="font-size:10px;color:#454860;font-weight:800;letter-spacing:2px;margin-bottom:4px">PRO</div>
        <div style="font-size:20px;font-weight:900;color:#454860">₪29<span style="font-size:12px">/mo</span></div>
      </div>
    </div>`;

  // Re-wire pricing buttons
  const back = document.getElementById('pricingBackBtn');
  const start = document.getElementById('pricingStartBtn');
  const showScreen = id => {
    ['landingScreen','pricingScreen','authScreen'].forEach(s=>{
      const e=document.getElementById(s); if(e) e.style.display='none';
    });
    const e=document.getElementById(id);
    if(e) e.style.display = id==='authScreen'?'flex':'block';
  };
  if(back) back.onclick = () => { showScreen('landingScreen'); renderLandingScreen(); };
  if(start) start.onclick = () => { showScreen('authScreen'); renderAuthScreen(); if(typeof switchTab==='function') switchTab('register'); };
}

function renderAuthScreen() {
  const L = LANGS[_lang]||LANGS.he;
  const dir = L.dir;
  const el = document.getElementById('authScreen');
  if(!el) return;
  el.dir = dir;

  // Update dynamic text within auth screen
  const sub = el.querySelector('.auth-sub');
  if(sub) sub.textContent = L.appTagline;

  const tabLogin = document.getElementById('tabLogin');
  const tabReg   = document.getElementById('tabRegister');
  const authName  = document.getElementById('authName');
  const authEmail = document.getElementById('authEmail');
  const authPass  = document.getElementById('authPass');
  const submitBtn = document.getElementById('authSubmitBtn');
  const forgotBtn = document.getElementById('forgotBtn');
  const googleBtn = el.querySelector('.auth-google');
  const backBtn   = document.getElementById('authBackBtn');
  const consentSpan = el.querySelector('#consentBox span');

  if(tabLogin)  tabLogin.textContent  = L.login;
  if(tabReg)    tabReg.textContent    = L.register;
  if(authName)  authName.placeholder  = L.fullName;
  if(authEmail) authEmail.placeholder = L.email;
  if(authPass)  authPass.placeholder  = L.password;
  if(submitBtn) submitBtn.textContent = typeof window._authTab !== 'undefined' && window._authTab==='register' ? L.signUp : L.signIn;
  if(forgotBtn) forgotBtn.textContent = L.forgotPass;
  if(googleBtn) { const txt = googleBtn.childNodes[googleBtn.childNodes.length-1]; if(txt) txt.textContent = ' ' + L.continueGoogle; }
  if(backBtn)   backBtn.textContent   = (dir==='rtl'?'→ ':'← ') + L.back;
  if(consentSpan) {
    consentSpan.innerHTML = L.consentText + `<br/><span style="color:#f87171;font-weight:700">${L.consentRequired}</span>`;
  }
}

// Comprehensive setLang that rebuilds all screens
window.setLang = function setLang(code) {
  _lang = code;
  localStorage.setItem('appLang', code);
  const L = LANGS[code]||LANGS.he;
  document.documentElement.lang = code;
  document.documentElement.dir  = L.dir;
  document.body.dir = L.dir;
  if(L.dir === 'ltr') document.body.classList.add('ltr-mode');
  else document.body.classList.remove('ltr-mode');

  // Rebuild visible screen
  const landing = document.getElementById('landingScreen');
  const pricing  = document.getElementById('pricingScreen');
  const auth     = document.getElementById('authScreen');
  const app      = document.getElementById('app');

  if(landing && landing.style.display !== 'none') renderLandingScreen();
  if(pricing && pricing.style.display !== 'none') renderPricingScreen();
  if(auth    && auth.style.display    !== 'none') renderAuthScreen();
  if(app     && app.style.display     !== 'none' && typeof render === 'function') render();
};

function renderLandingLang() { renderLandingScreen(); }

// Wire landing buttons immediately (DOM already parsed at this point)
renderLandingScreen();
renderPricingScreen();
initLanding();

</script>
</body>
</html>
