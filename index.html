<!DOCTYPE html>
<!-- תקציב – גרסה מלאה ומתוקנת (לא נחתך) -->
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>תקציב</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Heebo',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;}
.loading-screen{position:fixed;inset:0;background:#0f1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.loading-icon{background:linear-gradient(135deg,#6c63ff,#a78bfa);border-radius:20px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:30px;}
.spinner{width:24px;height:24px;border:3px solid #252836;border-top-color:#6c63ff;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.card{background:#161922;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;}
.stat-card{background:linear-gradient(135deg,rgba(108,99,255,.1),rgba(108,99,255,.05));border-radius:16px;padding:16px;text-align:center;}
.stat-val{font-size:26px;font-weight:800;color:#a78bfa;}
.btn-primary{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:white;padding:14px 24px;border-radius:14px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-icon">💰</div>
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">טוען…</div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="header" style="background:#161922;padding:16px;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="background:linear-gradient(135deg,#6c63ff,#a78bfa);width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px">💰</div>
      <div>
        <div style="font-weight:800;font-size:18px">תקציב</div>
        <div style="font-size:12px;color:#7b82a8">שלום אלירן</div>
      </div>
    </div>
  </div>

  <div class="content" style="padding:16px">
    <div class="card">
      <div style="font-size:13px;color:#a78bfa;font-weight:700;margin-bottom:12px">סיכום חודש מרץ 2026</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div style="font-size:20px">💰</div>
          <div style="font-size:12px;color:#7b82a8">הכנסות</div>
          <div class="stat-val">₪12,450</div>
        </div>
        <div class="stat-card">
          <div style="font-size:20px">💸</div>
          <div style="font-size:12px;color:#7b82a8">הוצאות</div>
          <div class="stat-val">₪8,320</div>
        </div>
        <div class="stat-card">
          <div style="font-size:20px">📈</div>
          <div style="font-size:12px;color:#7b82a8">יתרה</div>
          <div class="stat-val" style="color:#68d391">₪4,130</div>
        </div>
      </div>
    </div>

    <!-- גרף עוגה -->
    <div class="card">
      <div style="font-size:13px;color:#a78bfa;font-weight:700;margin-bottom:12px">הוצאות לפי קטגוריה</div>
      <canvas id="expenseChart" style="max-width:320px;margin:0 auto;display:block"></canvas>
    </div>

    <div style="text-align:center;margin-top:30px;color:#7b82a8;font-size:12px">
      האפליקציה טענה בהצלחה!<br>
      אם זה עובד – תגיד לי "עובד" ואני אוסיף את Firebase מלא.
    </div>
  </div>
</div>

<script>
// טעינה מיידית – אין Firebase כדי לבדוק שהקובץ עובד
document.getElementById('loadingScreen').style.display = 'none';
document.getElementById('app').style.display = 'block';

// גרף עוגה לדוגמה
const ctx = document.getElementById('expenseChart');
new Chart(ctx, {
  type: 'pie',
  data: {
    labels: ['מזון', 'תחבורה', 'בילויים', 'חיסכון'],
    datasets: [{ data: [3200, 1800, 1200, 2120], backgroundColor: ['#68d391','#f6ad55','#f87171','#a78bfa'] }]
  },
  options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#e8eaf0' } } } }
});
</script>
</body>
</html>
