[build]
  command   = "npm install && npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security Headers — Fix: HIGH-02 ──────────────────────────────────────────
# Applied to all routes
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Enable XSS protection in older browsers
    X-XSS-Protection = "1; mode=block"

    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable browser features not needed by this app
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"

    # Force HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Content Security Policy — restricts where resources can load from
    # - default-src 'self': only load from same origin by default
    # - script-src: allow inline scripts (needed by Vite/React)
    # - style-src: allow Google Fonts + inline styles
    # - connect-src: allow Firebase, Anthropic API (via Netlify function)
    # - frame-ancestors 'none': equivalent to X-Frame-Options DENY
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      connect-src 'self'
        https://*.firebaseio.com
        https://*.googleapis.com
        https://identitytoolkit.googleapis.com
        https://securetoken.googleapis.com
        https://firestore.googleapis.com
        https://www.googleapis.com;
      img-src 'self' data: https: blob:;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    """

# ── Static assets: long cache, immutable ─────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML: no cache (always fresh) ────────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
